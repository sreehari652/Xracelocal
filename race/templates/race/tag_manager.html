<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>XRace Live</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090e;--surf:#0c0f18;--panel:#111827;--border:#1c2639;
  --acc:#00d4ff;--red:#ff3b5c;--grn:#00ff88;--yel:#ffd700;--ora:#ff6b35;--pur:#a855f7;
  --txt:#dde6f5;--dim:#3d4f66;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Rajdhani',sans-serif;font-size:13px}
.topbar{height:42px;display:flex;align-items:center;gap:5px;padding:0 8px;background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:1.15rem;font-weight:700;letter-spacing:3px;color:var(--acc);margin-right:2px}.logo b{color:var(--red)}
select{padding:3px 6px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--txt);font:600 .74rem 'Rajdhani',sans-serif;outline:none;cursor:pointer;min-width:100px;max-width:165px}
select:focus{border-color:var(--acc)}select:disabled{opacity:.35;cursor:not-allowed}
.btn{padding:4px 9px;border-radius:4px;border:none;font:700 .7rem 'Rajdhani',sans-serif;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:filter .15s;white-space:nowrap;flex-shrink:0}
.btn:disabled{opacity:.3;cursor:not-allowed}
.bg{background:var(--grn);color:#000}.bg:hover:not(:disabled){filter:brightness(1.15)}
.br{background:var(--red);color:#fff}.br:hover:not(:disabled){filter:brightness(1.15)}
.by{background:var(--yel);color:#000}.by:hover:not(:disabled){filter:brightness(1.15)}
.bsm{background:var(--pur);color:#fff;font-size:.62rem;padding:3px 7px}.bsm:hover{filter:brightness(1.15)}
.badge{font-size:.58rem;padding:2px 7px;border-radius:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid;white-space:nowrap}
.blv{background:rgba(0,255,136,.1);color:var(--grn);border-color:rgba(0,255,136,.3)}
.bdn{background:rgba(255,59,92,.1);color:var(--red);border-color:rgba(255,59,92,.3)}
.bra{background:rgba(255,215,0,.12);color:var(--yel);border-color:rgba(255,215,0,.35)}
.bdf{background:rgba(255,255,255,.04);color:var(--dim);border-color:var(--border)}
.wsp{font-size:.58rem;padding:2px 7px;border-radius:12px;font-weight:700;border:1px solid}
.wson{background:rgba(0,255,136,.08);color:var(--grn);border-color:rgba(0,255,136,.22)}
.wsoff{background:rgba(255,59,92,.08);color:var(--red);border-color:rgba(255,59,92,.22)}
.cpill{font-size:.56rem;padding:2px 5px;border-radius:8px;background:rgba(168,85,247,.08);color:#a855f7;border:1px solid rgba(168,85,247,.25);display:none}
.dbar{height:16px;display:flex;gap:10px;align-items:center;padding:0 8px;background:rgba(0,0,0,.7);border-bottom:1px solid #111827;flex-shrink:0;overflow:hidden}
.dbar span{font:.56rem 'JetBrains Mono',monospace;white-space:nowrap;color:var(--dim)}
.dbar .hi{color:var(--acc)}.dbar .ok{color:var(--grn)}.dbar .w{color:var(--yel)}.dbar .e{color:var(--red)}
.ws{display:flex;flex:1;overflow:hidden;min-height:0}
/* LEFT */
.lp{width:200px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.pnlh{font:.58rem 'Rajdhani',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding:6px 8px 5px;border-bottom:1px solid var(--border);flex-shrink:0}
.lbl{flex:1;overflow-y:auto}.lbl::-webkit-scrollbar{width:3px}.lbl::-webkit-scrollbar-thumb{background:var(--border)}
.lrow{display:flex;align-items:center;gap:5px;padding:5px 7px;border-bottom:1px solid rgba(255,255,255,.03)}
.lrow.rcg{border-left:2px solid var(--rc,#00d4ff);background:rgba(0,212,255,.04)}
.lpos{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:.56rem 'JetBrains Mono',monospace;font-weight:700;flex-shrink:0;border:1.5px solid}
.lmid{flex:1;min-width:0}
.lname{font-weight:700;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lsub{font-size:.5rem;color:var(--dim);display:flex;gap:3px;flex-wrap:wrap;margin-top:1px}
.lbar{height:2px;background:var(--border);border-radius:1px;margin-top:2px;overflow:hidden}
.lbf{height:100%;border-radius:1px;transition:width .5s}
.lright{min-width:66px;text-align:right;flex-shrink:0}
.lbt{font:.78rem 'JetBrains Mono',monospace;font-weight:700;color:var(--acc);line-height:1}
.lbn{font:.47rem 'JetBrains Mono',monospace;color:rgba(255,255,255,.28);margin-top:2px}
.lbb{font:.68rem 'JetBrains Mono',monospace;font-weight:700}
.lbd{font:.48rem 'JetBrains Mono',monospace;color:var(--dim)}
/* CENTER */
.cp{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.raw{background:#040710;border-bottom:1px solid var(--border);height:80px;flex-shrink:0;display:flex;flex-direction:column;font-family:'JetBrains Mono',monospace}
.rawh{display:flex;justify-content:space-between;align-items:center;padding:2px 8px;border-bottom:1px solid #0d1117;flex-shrink:0}
.rawrt{display:flex;gap:3px;padding:2px 8px;height:20px;align-items:center;border-bottom:1px solid #0d1117;flex-shrink:0;overflow-x:auto}
.rawrt::-webkit-scrollbar{height:2px}
.rawl{overflow-y:auto;flex:1}.rawl::-webkit-scrollbar{width:3px}.rawl::-webkit-scrollbar-thumb{background:#111827}
.rl{display:flex;gap:4px;padding:0 8px;font-size:.52rem;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,.015);align-items:baseline}
.rt{color:var(--dim);width:42px;flex-shrink:0}.ri{font-weight:700;width:26px;flex-shrink:0}
.rxy{color:var(--grn);width:88px;flex-shrink:0}.rr{color:var(--acc);flex:1}.rq{width:44px;flex-shrink:0;text-align:right}
.rq.excellent{color:var(--grn)}.rq.good{color:var(--yel)}.rq.fair{color:var(--ora)}.rq.oob{color:var(--red)}
.cva{flex:1;display:flex;align-items:center;justify-content:center;padding:5px;position:relative;min-height:0}
canvas{border-radius:6px;border:1px solid var(--border);max-width:100%;max-height:100%}
#pops{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.pop{position:absolute;transform:translate(-50%,-50%);animation:popA 3s ease forwards;pointer-events:none;text-align:center}
@keyframes popA{0%{opacity:0;transform:translate(-50%,-65%) scale(.7)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}25%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-85%)}}
.pop-in{background:rgba(0,0,0,.9);border:2px solid;border-radius:8px;padding:5px 12px;backdrop-filter:blur(4px)}
.pop-lb{font-size:.54rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:'JetBrains Mono',monospace}
.pop-nm{font-size:.8rem;font-weight:700}
.pop-tm{font-size:1.18rem;font-weight:700;font-family:'JetBrains Mono',monospace}
/* RIGHT */
.rp{width:255px;background:var(--surf);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:0 6px 5px}
.sb{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:3px 6px}
.sb .v{font:.86rem 'JetBrains Mono',monospace;font-weight:700;color:var(--acc)}.sb .l{font-size:.5rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.cds{flex:1;overflow-y:auto;padding:4px 6px}.cds::-webkit-scrollbar{width:3px}.cds::-webkit-scrollbar-thumb{background:var(--border)}
/* CARD */
.card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:5px;margin-bottom:5px;overflow:hidden}
.card.rcg{border-left-color:var(--cc)}
.chdr{display:flex;align-items:center;gap:5px;padding:5px 7px 4px}
.cdot{width:6px;height:6px;border-radius:50%;background:var(--cc,var(--dim));flex-shrink:0}
.cnm{font-weight:700;font-size:.86rem;flex:1}
.ctg{font:.56rem 'JetBrains Mono',monospace;background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:1px 4px;color:var(--dim)}
.cpos{font:.56rem 'JetBrains Mono',monospace;color:var(--grn);padding:1px 7px 2px}
/* TIMER BLOCK */
.tb{border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05)}
.tmn{display:flex;align-items:flex-start;justify-content:space-between;padding:5px 8px 2px}
.tlbl{font-size:.5rem;letter-spacing:1.5px;color:rgba(255,255,255,.25);text-transform:uppercase;font-weight:600;margin-bottom:1px}
/* THE TIMER NUMBER */
.tval{font:700 1.28rem 'JetBrains Mono',monospace;color:var(--acc);line-height:1;letter-spacing:.5px;text-shadow:0 0 16px rgba(0,212,255,.5)}
.tval.fin{color:var(--grn);text-shadow:0 0 16px rgba(0,255,136,.4)}
.tval.off{color:rgba(255,255,255,.1);font-size:.88rem;text-shadow:none}
.tlapn{font:.48rem 'JetBrains Mono',monospace;color:var(--dim);padding:0 8px 3px;text-align:right}
.tpg{height:2px;background:rgba(255,255,255,.05);overflow:hidden}
.tpgf{height:100%;background:linear-gradient(90deg,var(--acc),var(--grn));width:0%;transition:width .1s linear}
.tdt{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid rgba(255,255,255,.04)}
.tdtc{padding:3px 7px;border-right:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04)}
.tdtc:nth-child(even){border-right:none}.tdtc:nth-last-child(-n+2){border-bottom:none}
.dl{font-size:.47rem;letter-spacing:1px;color:rgba(255,255,255,.22);text-transform:uppercase}
.dv{font:.7rem 'JetBrains Mono',monospace;font-weight:700;color:#fff;margin-top:1px}
.dv.y{color:var(--yel)}.dv.g{color:var(--grn)}.dv.r{color:var(--red)}.dv.d{color:rgba(255,255,255,.18);font-size:.6rem}
.cprow{display:flex;align-items:center;gap:2px;padding:3px 7px;border-top:1px solid rgba(255,255,255,.04);flex-wrap:wrap}
.pip{width:9px;height:9px;border-radius:50%;border:1.5px solid;transition:all .2s;flex-shrink:0}
.chips{display:flex;gap:2px;flex-wrap:wrap;padding:3px 7px;border-top:1px solid rgba(255,255,255,.04)}
.chip{font:.49rem 'JetBrains Mono',monospace;font-weight:700;padding:1px 4px;border-radius:5px;border:1px solid}
.cw2{background:rgba(255,107,53,.1);color:#ff6b35;border-color:rgba(255,107,53,.3)}
.cc2{background:rgba(255,59,92,.1);color:#ff3b5c;border-color:rgba(255,59,92,.3)}
.cpn{background:rgba(255,215,0,.1);color:#ffd700;border-color:rgba(255,215,0,.28)}
.cbn{background:rgba(0,255,136,.1);color:#00ff88;border-color:rgba(0,255,136,.28)}
.ti{padding:3px 7px 5px;border-top:1px solid rgba(255,255,255,.04)}
.tinp{width:100%;padding:3px 6px;border-radius:3px;border:1px solid var(--border);background:var(--bg);color:var(--txt);font:.7rem 'JetBrains Mono',monospace;outline:none}
.tinp:focus{border-color:var(--acc)}
.thi{font-size:.52rem;min-height:11px;text-align:right;margin-top:1px}
.thi.ok{color:var(--grn)}.thi.e{color:var(--red)}.thi.s{color:var(--yel)}
.feed{height:52px;overflow-y:auto;padding:3px 7px;border-top:1px solid var(--border);flex-shrink:0}
.feed::-webkit-scrollbar{width:3px}
.fi{font:.51rem 'JetBrains Mono',monospace;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi.hi{color:var(--acc)}
.tvp{position:fixed;bottom:12px;right:265px;display:flex;flex-direction:column;gap:3px;z-index:999;pointer-events:none}
.toast{padding:5px 10px;border-radius:4px;font:.63rem 'JetBrains Mono',monospace;font-weight:700;border:1px solid;animation:tIn .25s ease,tOut .35s ease 2.65s forwards;opacity:0}
@keyframes tIn{from{transform:translateX(25px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tOut{to{transform:translateX(25px);opacity:0}}
.twall{background:rgba(255,107,53,.18);color:#ff6b35;border-color:rgba(255,107,53,.45)}
.tcar{background:rgba(255,59,92,.18);color:#ff3b5c;border-color:rgba(255,59,92,.45)}
.tlap{background:rgba(255,215,0,.18);color:#ffd700;border-color:rgba(255,215,0,.45)}
.tfin{background:rgba(0,255,136,.18);color:#00ff88;border-color:rgba(0,255,136,.45)}
.tgo{background:rgba(0,212,255,.18);color:#00d4ff;border-color:rgba(0,212,255,.45)}
.blink{animation:bk 1s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.32}}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100%">
<div class="topbar">
  <div class="logo">X<b>Race</b></div>
  <select id="tSel" onchange="loadGroups()"><option value="">— Tournament —</option></select>
  <select id="gSel" onchange="selectGroup()" disabled><option value="">— Group —</option></select>
  <span class="badge bdf" id="gBadge"></span>
  <button class="btn bg" id="btnLive" onclick="doLive()" disabled>▶ Live</button>
  <button class="btn br" id="btnFin" onclick="doFinish()" disabled>⏹ Finish</button>
  <button class="btn by" id="btnRes" onclick="doReset()" disabled>↺ Reset</button>
  <button class="btn bsm" onclick="downloadCSV()">⬇ CSV</button>
  <span class="cpill" id="cpW">🚧—</span><span class="cpill" id="cpA">💥—</span><span class="cpill" id="cpV">🛡—</span>
  <span class="wsp wsoff" id="wsPill">● WS</span>
</div>
<div class="dbar">
  <span>WS:<span id="db_ws" class="e">off</span></span>
  <span>Pkts:<span id="db_p" class="hi">0</span></span>
  <span>Tags:<span id="db_k" class="hi">—</span></span>
  <span>Plyrs:<span id="db_pl" class="ok">0</span></span>
  <span>Pos:<span id="db_pos" class="ok">—</span></span>
  <span>Wall+<span id="db_wall" class="w">—</span>s</span>
  <span>Atk+<span id="db_atk" class="e">—</span>s</span>
  <span>Vic-<span id="db_vic" class="ok">—</span>s</span>
</div>
<div class="ws">
  <div class="lp">
    <div class="pnlh">🏆 Live Rankings</div>
    <div class="lbl" id="lbL"><div style="color:var(--dim);font-size:.64rem;text-align:center;padding:14px 6px">Select a group</div></div>
  </div>
  <div class="cp">
    <div class="raw">
      <div class="rawh">
        <span style="color:var(--acc);font-weight:700;letter-spacing:2px;font-size:.56rem">▶ RAW UDP</span>
        <div style="display:flex;gap:4px;align-items:center">
          <span id="rawR" style="color:var(--yel);font-size:.54rem">0 pkt/s</span>
          <button onclick="clrRaw()" style="padding:1px 5px;background:var(--panel);border:1px solid var(--border);border-radius:2px;color:var(--txt);font:.49rem 'JetBrains Mono',monospace;cursor:pointer">CLR</button>
          <button onclick="togRaw()" id="rawPB" style="padding:1px 5px;background:var(--panel);border:1px solid var(--border);border-radius:2px;color:var(--txt);font:.49rem 'JetBrains Mono',monospace;cursor:pointer">PAUSE</button>
        </div>
      </div>
      <div class="rawrt" id="rawRT"><span style="color:var(--dim);font-size:.52rem">waiting…</span></div>
      <div class="rawl" id="rawL">
        <div class="rl"><span class="rt">TIME</span><span class="ri">TAG</span><span class="rxy">X,Y cm</span><span class="rr">RANGES</span><span class="rq">QUAL</span></div>
      </div>
    </div>
    <div class="cva"><canvas id="c" width="920" height="560"></canvas><div id="pops"></div></div>
  </div>
  <div class="rp">
    <div class="pnlh" style="margin-bottom:3px">Drivers</div>
    <div class="sg">
      <div class="sb"><div class="v" id="sPkt">0</div><div class="l">Pkt/s</div></div>
      <div class="sb"><div class="v" id="sAct">0</div><div class="l">Active</div></div>
      <div class="sb"><div class="v" id="sLaps">—</div><div class="l">Laps</div></div>
      <div class="sb"><div class="v" id="sGrp">—</div><div class="l">Group</div></div>
    </div>
    <div class="cds" id="cards"><p style="color:var(--dim);font-size:.7rem;text-align:center;padding:14px">Select a group</p></div>
    <div class="feed" id="feed"></div>
  </div>
</div>
</div>
<div class="tvp" id="tv"></div>
<script>
// ═══════════════════════════ CONFIG ═══════════════════════════════
const BASE='https://xraceapi.zyberspace.in';
const WS_URL='ws://localhost:8001/';
const ANC=[{x:0,y:0},{x:610,y:0},{x:610,y:440},{x:0,y:440}];
const SF={x1:200,y1:8,x2:290,y2:108};
const CPS=[
  {id:0,x1:320,y1:8,x2:430,y2:108},{id:1,x1:450,y1:8,x2:540,y2:108},
  {id:2,x1:535,y1:8,x2:602,y2:145},{id:3,x1:492,y1:145,x2:602,y2:250},
  {id:4,x1:492,y1:250,x2:602,y2:360},{id:5,x1:492,y1:355,x2:602,y2:432},
  {id:6,x1:340,y1:332,x2:490,y2:432},{id:7,x1:150,y1:332,x2:340,y2:432},
  {id:8,x1:8,y1:332,x2:150,y2:432},{id:9,x1:8,y1:220,x2:118,y2:332},
  {id:10,x1:8,y1:108,x2:118,y2:220},{id:11,x1:8,y1:8,x2:118,y2:108},
];
const COLS=['#00d4ff','#ff3b5c','#00ff88','#ffd700','#a855f7','#ff6b35'];
const MED=['#ffd700','#c0c0c0','#cd7f32'];

// ═══════════════════════════ STATE ════════════════════════════════
let curGroup=null,curStatus='',curTotalLaps=10,raceConfig={total_laps:10};
let players=[],tagData={},reassign=false,lbData=[];
let pktSec=0,pktAll=0,WPEN=5,APEN=5,VBON=2;

function ensureTag(tid){
  if(tagData[tid])return;
  tagData[tid]={x:0,y:0,speed:0,lastMs:0,lapTrail:[],ghost:null,
    flashWall:false,flashCar:false,wallHits:0,carHits:0,penCur:0,bonCur:0,lapInfo:null,
    // SOURCE OF TRUTH FOR TIMERS:
    isRacing:false,isFinished:false,lapStartMs:null,lapNum:0,totalLaps:curTotalLaps,bestElp:null,lapsDone:0};
}

// ═══════════════════════════ FORMAT ═══════════════════════════════
function fT(s,dec=3){
  if(s==null||isNaN(s)||s>9999||s===Infinity)return'—';
  const m=Math.floor(s/60);
  const r=(s%60).toFixed(dec).padStart(dec+3,'0');
  return m>0?`${m}:${r}`:r;
}

// ═══════════════════════════ CANVAS ═══════════════════════════════
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let cS,cOX,cOY;
function proj(){cS=Math.min((cv.width-84)/610,(cv.height-84)/440)*.97;cOX=(cv.width-610*cS)/2;cOY=(cv.height-440*cS)/2}
proj();
const tp=(x,y)=>({px:cOX+x*cS,py:cv.height-(cOY+y*cS)});

function rrP(L,R,B,T,r,n=10){
  const arc=(cx,cy,ra,a0,a1)=>{const p=[];for(let i=0;i<=n;i++){const t=(a0+(a1-a0)*i/n)*Math.PI/180;p.push({x:cx+ra*Math.cos(t),y:cy+ra*Math.sin(t)})}return p};
  return[...arc(R-r,B+r,r,-90,0),...arc(R-r,T-r,r,0,90),...arc(L+r,T-r,r,90,180),...arc(L+r,B+r,r,180,270)];
}
const OP=rrP(8,602,8,432,48,12),IP=rrP(118,492,108,332,40,12),CL=rrP(63,547,58,382,44,8);

function pth(pts,cl){ctx.beginPath();pts.forEach((p,i)=>{const{px,py}=tp(p.x,p.y);i?ctx.lineTo(px,py):ctx.moveTo(px,py)});if(cl)ctx.closePath()}

function curbs(pts,w){
  const n=pts.length;let acc=0;
  for(let i=0;i<n;i++){
    const a=tp(pts[i].x,pts[i].y),b=tp(pts[(i+1)%n].x,pts[(i+1)%n].y);
    const dl=Math.hypot(b.px-a.px,b.py-a.py)||1;
    const nx=-(b.py-a.py)/dl*w,ny=(b.px-a.px)/dl*w;
    let t=0;const seg=7;
    while(t<dl){const t1=Math.min(t+seg,dl),f0=t/dl,f1=t1/dl;
      const x0=a.px+(b.px-a.px)*f0,y0=a.py+(b.py-a.py)*f0,x1=a.px+(b.px-a.px)*f1,y1=a.py+(b.py-a.py)*f1;
      ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.lineTo(x1+nx,y1+ny);ctx.lineTo(x0+nx,y0+ny);ctx.closePath();
      ctx.fillStyle=Math.floor(acc/seg)%2===0?'#b91c1c':'#fff';ctx.fill();acc+=t1-t;t=t1}
  }
}

    // Flash

    if(d.flashCar&&Math.floor(now/80)%2===0){ctx.save();ctx.globalAlpha=.8;ctx.strokeStyle='#ff3b5c';ctx.lineWidth=3;ctx.shadowColor='#ff3b5c';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(pp.px,pp.py,18,0,Math.PI*2);ctx.stroke();ctx.restore()}
    // Dot
    ctx.shadowColor=col;ctx.shadowBlur=12;ctx.fillStyle=col;ctx.beginPath();ctx.arc(pp.px,pp.py,10.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='#fff';ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(pp.px,pp.py,10.5,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#000';ctx.font='bold 10px Rajdhani,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pI>=0?pI+1:'?',pp.px,pp.py);ctx.textBaseline='alphabetic';
    // Label
    ctx.font='bold 10px Rajdhani,sans-serif';ctx.textAlign='center';const lw=ctx.measureText(lbl).width+9;ctx.fillStyle='rgba(0,0,0,.58)';ctx.fillRect(pp.px-lw/2,pp.py-25,lw,13);ctx.fillStyle=col;ctx.fillText(lbl,pp.px,pp.py-15);
    // ── ON-CANVAS TIMER ──
    if(d.isRacing&&d.lapStartMs){
      const el=(now-d.lapStartMs)/1000,tw=102,th=36,tx=pp.px-tw/2,ty=pp.py-74;
      ctx.save();ctx.shadowColor=col;ctx.shadowBlur=14;ctx.fillStyle='rgba(0,0,0,.88)';ctx.beginPath();ctx.roundRect(tx,ty,tw,th,5);ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(tx,ty,tw,th,5);ctx.stroke();
      ctx.globalAlpha=.22+.16*Math.sin(now/240);ctx.strokeStyle=col;ctx.lineWidth=3;ctx.beginPath();ctx.roundRect(tx,ty,tw,th,5);ctx.stroke();ctx.globalAlpha=1;
      ctx.font='700 8px Rajdhani,sans-serif';ctx.fillStyle=col;ctx.textAlign='center';ctx.fillText(`LAP ${d.lapNum||1}/${d.totalLaps||curTotalLaps}`,pp.px,ty+10);
      ctx.font='700 14px JetBrains Mono,monospace';ctx.fillStyle='#fff';ctx.shadowColor='rgba(255,255,255,.5)';ctx.shadowBlur=4;ctx.fillText(fT(el),pp.px,ty+26);ctx.shadowBlur=0;
      if(d.penCur>0){ctx.font='700 7px JetBrains Mono,monospace';ctx.fillStyle='#ff6b35';ctx.fillText('+'+d.penCur.toFixed(1)+'s PEN',pp.px,ty-4)}
      ctx.restore();

      ctx.save();ctx.fillStyle='rgba(0,255,136,.12)';ctx.beginPath();ctx.roundRect(tx,ty,tw,th,5);ctx.fill();ctx.strokeStyle='#00ff88';ctx.lineWidth=1.4;ctx.beginPath();ctx.roundRect(tx,ty,tw,th,5);ctx.stroke();ctx.font='700 8px Rajdhani,sans-serif';ctx.fillStyle='#00ff88';ctx.textAlign='center';ctx.fillText('🏁 FINISHED',pp.px,ty+9);ctx.font='700 10px JetBrains Mono,monospace';ctx.fillStyle='#ffd700';ctx.fillText(fT(d.bestElp),pp.px,ty+20);ctx.restore();

  });

// MASTER TIMER TICK — updates DOM timer elements every 50ms
// Completely independent of render calls.
// ═══════════════════════════════════════════════════════
setInterval(()=>{
  const now=Date.now();
  // Big timer in driver card
  document.querySelectorAll('[data-timer]').forEach(el=>{
    const d=tagData[+el.dataset.timer];
    if(d?.isRacing&&d.lapStartMs) el.textContent=fT(Math.max(0,(now-d.lapStartMs)/1000));
  });
  // Compact timer in leaderboard
  document.querySelectorAll('[data-lbt]').forEach(el=>{
    const d=tagData[+el.dataset.lbt];
    if(d?.isRacing&&d.lapStartMs) el.textContent=fT(Math.max(0,(now-d.lapStartMs)/1000),2);
  });
  // Progress bar
  document.querySelectorAll('[data-prog]').forEach(el=>{
    const d=tagData[+el.dataset.prog];
    if(d?.isRacing&&d.lapStartMs&&d.bestElp)
      el.style.width=Math.min(100,(now-d.lapStartMs)/1000/d.bestElp*100)+'%';
  });
},50);

// ═══════════════════════════ WEBSOCKET ════════════════════════════
let ws,recon;
function startWS(){
  try{ws&&ws.close()}catch(e){}
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{pill(1);dset('db_ws','on','ok');clearTimeout(recon);recon=null};
  ws.onclose=()=>{pill(0);dset('db_ws','off','e');if(!recon)recon=setTimeout(startWS,2500)};
  ws.onerror=()=>pill(0);
  ws.onmessage=({data})=>{
    let msg;try{msg=JSON.parse(data)}catch{return}
    if(msg.type==='state_update'){
      if(msg.total_laps)document.getElementById('sLaps').textContent=msg.total_laps;
      if(msg.group_id)document.getElementById('sGrp').textContent=msg.group_id;
      if(msg.leaderboard){lbData=msg.leaderboard;renderLB()}
      if(msg.feed?.length)addFeed(msg.feed);
      if(msg.cars)syncState(msg.cars);
      return;
    }
    if(msg.type==='tag_position'){
      const tid=+msg.tag_id;if(isNaN(tid))return;
      rawIn(tid,msg);pktSec++;pktAll++;
      ensureTag(tid);
      const d=tagData[tid];
      d.x=msg.x;d.y=msg.y;d.speed=msg.speed??0;d.lastMs=Date.now();
      d.penCur=msg.current_penalty??0;d.bonCur=msg.current_bonus??0;
      if(msg.wall_hits!=null)d.wallHits=msg.wall_hits;
      if(msg.car_collisions!=null)d.carHits=msg.car_collisions;
      // Sync lap timer from server elapsed (drift-correcting)
      const li=msg.lap_info;
      if(li){
        d.lapInfo=li;d.lapNum=li.current_lap||0;d.totalLaps=li.total_laps||curTotalLaps;
        if(li.is_racing&&li.current_lap_elapsed!=null){
          const comp=Date.now()-(li.current_lap_elapsed*1000);
          if(!d.lapStartMs||Math.abs(d.lapStartMs-comp)>2000)d.lapStartMs=comp;
          d.isRacing=true;
        }
        if(!li.is_racing){d.lapStartMs=null;d.isRacing=false}
        d.isFinished=!!li.race_finished;
      }
      if(d.isRacing){const last=d.lapTrail[d.lapTrail.length-1];if(!last||Math.hypot(msg.x-last.x,msg.y-last.y)>2)d.lapTrail.push({x:msg.x,y:msg.y})}
      if(pktAll%20===0){dset('db_pos',`T${tid}(${msg.x?.toFixed(0)},${msg.y?.toFixed(0)})`,'ok');rDB()}
      // Game events
      const evts=msg.game_events;if(!evts?.length)return;
      const pI=players.findIndex(p=>+p.tag_id===tid),pl=players[pI];
      const col=pI>=0?COLS[pI%COLS.length]:'#fff',name=pl?pl.player_name:'Tag'+tid;
      evts.forEach(ev=>{
        if(ev.type==='race_start'){
          // ══ LAP TIMER STARTS HERE ══
          d.lapStartMs=Date.now();
          d.lapNum=ev.lap||1;d.totalLaps=ev.total_laps||curTotalLaps;
          d.isRacing=true;d.isFinished=false;d.lapTrail=[];
          if(d.lapInfo)d.lapInfo.is_racing=true;
          popup(tid,'🏁 LAP START',name,null,col,'go');
          toast(`🟢 ${name} — Lap 1 started!`,'go');
          addFeed([`🟢 START ${name} L1/${d.totalLaps}`]);
          patchCard(tid);renderLB();
        } else if(ev.type==='lap_done'){
          const et=ev.elp,pen=ev.penalty||0;
          popup(tid,`LAP ${ev.lap} DONE`,name,et,col,'lap');
          toast(`🏁 ${name} L${ev.lap} — ${fT(et)}${pen?` +${pen.toFixed(1)}s`:''}` ,'lap');
          addFeed([`🏁 LAP${ev.lap} ${name} ${fT(et,2)}${pen?` +${pen.toFixed(1)}s`:''}`]);
          let lb=lbData.find(r=>r.car_id===tid);
          if(!lb){lb={car_id:tid,car_name:name,best_elp:et,best_raw:ev.raw_time,laps_done:1};lbData.push(lb)}
          else{if(et<lb.best_elp){lb.best_elp=et;lb.best_raw=ev.raw_time}lb.laps_done++}
          d.bestElp=lbData.find(r=>r.car_id===tid)?.best_elp??null;
          d.lapsDone++;
          // ══ NEXT LAP TIMER STARTS IMMEDIATELY ══
          d.lapStartMs=Date.now();d.lapNum=(ev.lap||1)+1;
          d.ghost=[...d.lapTrail];d.lapTrail=[];
          if(d.lapInfo)d.lapInfo.checkpoints_hit=0;
          patchCard(tid);renderLB();
        } else if(ev.type==='race_finish'){
          d.isRacing=false;d.isFinished=true;d.lapStartMs=null;
          if(d.lapInfo)d.lapInfo.is_racing=false;
          popup(tid,'🏆 FINISHED!',name,ev.elp,col,'fin');
          toast(`🏆 ${name} FINISHED! Best:${fT(d.bestElp??ev.elp)}`,'fin');
          addFeed([`🏆 FINISH ${name} Best:${fT(d.bestElp)}`]);
          patchCard(tid);renderLB();
        } else if(ev.type==='checkpoint'){
          if(d.lapInfo)d.lapInfo.checkpoints_hit=ev.cp_index+1;
          addFeed([`📍 CP${ev.cp_index} ${name}`]);
        } else if(ev.type==='wall'){
          d.wallHits=(d.wallHits||0)+1;flash(tid,'wall');
          toast(`🚧 WALL ${name} L${ev.lap} +${ev.penalty||WPEN}s`,'wall');
          addFeed([`🚧 WALL ${name} +${ev.penalty||WPEN}s`]);patchCard(tid);
        } else if(ev.type==='car'){
          if(ev.attacker!=null)flash(ev.attacker,'car');if(ev.victim!=null)flash(ev.victim,'car');
          toast(`💥 ${ev.attacker_name}+${ev.atk_penalty||APEN}s → ${ev.victim_name}-${ev.vic_bonus||VBON}s`,'car');
          addFeed([`💥 ${ev.attacker_name}+${ev.atk_penalty||APEN}s → ${ev.victim_name}-${ev.vic_bonus||VBON}s`]);
        }
      });
      return;
    }
    if(msg.type==='admin_event')addFeed([`[${msg.event}] ${msg.message}`]);
  };
}
function pill(ok){const e=document.getElementById('wsPill');e.className='wsp '+(ok?'wson':'wsoff');e.textContent=ok?'● On':'● Off'}
function sendWS(p){if(ws?.readyState===WebSocket.OPEN)ws.send(JSON.stringify(p))}
function syncState(cars){
  cars.forEach(car=>{
    const tid=+car.tag_id;if(isNaN(tid))return;
    ensureTag(tid);const d=tagData[tid];
    if(car.x!=null){d.x=car.x;d.y=car.y}d.lastMs=Date.now();
    if(car.speed!=null)d.speed=car.speed;
    if(car.wall_hits!=null)d.wallHits=car.wall_hits;
    if(car.current_penalty!=null)d.penCur=car.current_penalty;
    if(car.current_bonus!=null)d.bonCur=car.current_bonus;
    const li=car.lap_info||car.lapInfo;
    if(li){d.lapInfo=li;d.lapNum=li.current_lap||0;d.totalLaps=li.total_laps||curTotalLaps;
      d.isRacing=!!li.is_racing;d.isFinished=!!li.race_finished;
      if(d.isRacing&&li.current_lap_elapsed!=null){const c=Date.now()-(li.current_lap_elapsed*1000);if(!d.lapStartMs||Math.abs(d.lapStartMs-c)>2000)d.lapStartMs=c}
      if(!d.isRacing)d.lapStartMs=null;}
  });
  renderPlayers();renderLB();rDB();
}
startWS();

function renderLB(){
  const w=document.getElementById('lbL');if(!w)return;
  const ranked=[];
  lbData.forEach(lb=>{const pl=players.find(p=>+p.tag_id===lb.car_id);ranked.push({lb,pl})});
  players.forEach(p=>{if(!ranked.find(r=>r.pl===p))ranked.push({lb:null,pl:p})});
  ranked.sort((a,b)=>{const ae=a.lb?.best_elp??Infinity,be=b.lb?.best_elp??Infinity;if(ae<Infinity&&be<Infinity)return ae-be;if(ae<Infinity)return-1;if(be<Infinity)return 1;return(b.lb?.laps_done??-1)-(a.lb?.laps_done??-1)});
  const top=ranked[0]?.lb?.best_elp??null;
  w.innerHTML=ranked.map(({lb,pl},ri)=>{
    if(!pl)return'';
    const i=players.indexOf(pl),col=COLS[i%COLS.length],mc=ri<3&&lb?MED[ri]:'rgba(255,255,255,.16)';
    const pos=lb?(ri<3?['1ST','2ND','3RD'][ri]:`P${ri+1}`):'—';
    const tid=+pl.tag_id;const d=!isNaN(tid)?tagData[tid]:null;
    const racing=d?.isRacing&&!d?.isFinished,fin=d?.isFinished;
    const be=lb?.best_elp,delta=ri>0&&be&&top&&be>top?`+${(be-top).toFixed(2)}s`:'';
    const bp=be&&top?Math.max(5,top/be*100):0,ld=lb?.laps_done??d?.lapsDone??0;
    let right='';
    if(racing)right=`<div><div class="lbt" data-lbt="${tid}">0.00</div><div class="lbn">LAP ${d.lapNum||1}/${d.totalLaps||curTotalLaps}</div></div>`;
    else if(be)right=`<div><div class="lbb" style="color:${ri===0?MED[0]:'#fff'}">${fT(be,2)}</div>${delta?`<div class="lbd">${delta}</div>`:''}</div>`;
    else if(fin)right=`<div style="font-size:.52rem;color:var(--grn);font-weight:700">DONE</div>`;
    else right=`<div style="font-size:.49rem;color:var(--dim)">waiting</div>`;
    return`<div class="lrow${racing?' rcg':''}" style="${racing?'--rc:'+col:''}">
      <div class="lpos" style="border-color:${mc};color:${mc}">${pos}</div>
      <div class="lmid"><div class="lname" style="color:${col}">${pl.player_name}</div>
        <div class="lsub">${ld?`<span>${ld}/${curTotalLaps}L</span>`:'<span>waiting</span>'} ${fin?'<span style="color:var(--grn)">🏁</span>':''} ${racing?`<span class="blink" style="color:var(--acc);font-size:.48rem">⬤LIVE</span>`:''}</div>
        <div class="lbar"><div class="lbf" style="width:${bp}%;background:${col}"></div></div>
      </div>
      <div class="lright">${right}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════ DRIVER CARDS ═════════════════════════
function renderPlayers(){
  const w=document.getElementById('cards');
  if(!players.length){w.innerHTML='<p style="color:var(--dim);font-size:.7rem;text-align:center;padding:14px">No players</p>';return}
  const ed=canEdit(),now=Date.now();
  const ban=reassign?`<div style="background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.22);border-radius:4px;padding:4px 6px;margin-bottom:4px;font-size:.62rem;color:var(--yel);font-weight:600">↺ Reassign tags → ▶ Restart Race</div>`:'';
  w.innerHTML=ban+players.map((p,i)=>buildCard(p,i,ed,now)).join('');
}

function buildCard(p,idx,ed,now){
  const col=COLS[idx%COLS.length],tid=+p.tag_id,d=!isNaN(tid)?tagData[tid]:null;
  const fresh=d&&(now-d.lastMs)<6000,racing=d?.isRacing===true,fin=d?.isFinished===true;
  const lb=!isNaN(tid)?lbData.find(r=>r.car_id===tid):null;
  const be=d?.bestElp??null,ld=d?.lapsDone??lb?.laps_done??0;
  const pt=lb?.penalty_total??0,bt=lb?.bonus_total??0;
  const cpH=d?.lapInfo?.checkpoints_hit||0,wh=d?.wallHits||0,ch=d?.carHits||0,pc=d?.penCur??0,bc=d?.bonCur??0;

  let pos=fresh&&d?`<div class="cpos">${d.x.toFixed(0)},${d.y.toFixed(0)} · ${(d.speed||0).toFixed(1)}km/h</div>`:'';

  // ── Timer block ──
  let tb='';
  if(racing){
    const pips=CPS.map(cp=>{
      const dn=cp.id<cpH,nx=cp.id===cpH;
      const bg=dn?'#00ff88':nx?'#ffd700':'rgba(255,255,255,.07)';
      const br=dn?'#00ff88':nx?'#ffd700':'rgba(255,255,255,.14)';
      return`<span class="pip" title="CP${cp.id}" style="background:${bg};border-color:${br}${dn?';box-shadow:0 0 4px '+bg:''}"></span>`;
    }).join('');
    tb=`<div class="tb">
      <div class="tmn">
        <div>
          <div class="tlbl">Lap ${d.lapNum||1}/${d.totalLaps||curTotalLaps}</div>
          <div class="tval" data-timer="${tid}">0.000</div>
        </div>
        ${be?`<div style="text-align:right"><div class="tlbl">Best</div><div class="dv y">${fT(be,2)}</div></div>`:''}
      </div>
      <div class="tpg"><div class="tpgf" data-prog="${tid}" style="background:${col}"></div></div>
      <div class="tlapn">${ld} laps done</div>
    </div>
    <div style="border-top:1px solid rgba(255,255,255,.04)">
      <div class="cprow">${pips}<span style="font-size:.46rem;color:rgba(255,255,255,.17);margin-left:3px">${cpH}/${CPS.length} CPs</span></div>
      ${(wh||ch||pc||bc)?`<div class="chips">
        ${wh?`<span class="chip cw2">🚧×${wh}</span>`:''}
        ${ch?`<span class="chip cc2">💥×${ch}</span>`:''}
        ${pc>0?`<span class="chip cpn">+${pc.toFixed(1)}s</span>`:''}
        ${bc>0?`<span class="chip cbn">-${bc.toFixed(1)}s</span>`:''}
      </div>`:''}
    </div>`;
  } else if(fin){
    tb=`<div class="tb"><div class="tmn">
      <div><div class="tlbl">🏆 Finished</div><div class="tval fin">${be?fT(be):'—'}</div></div>
      <div style="text-align:right"><div class="tlbl">Laps</div><div class="dv g">${ld}/${curTotalLaps}</div></div>
    </div></div>`;
  } else if(be||ld>0){
    tb=`<div class="tdt">
      ${be?`<div class="tdtc"><div class="dl">Best ELP</div><div class="dv y">${fT(be,2)}</div></div>`:'<div class="tdtc"><div class="dl">Best</div><div class="dv d">—</div></div>'}
      <div class="tdtc"><div class="dl">Laps</div><div class="dv">${ld}/${curTotalLaps}</div></div>
      ${pt?`<div class="tdtc"><div class="dl">Pen</div><div class="dv r">+${pt.toFixed(1)}s</div></div>`:''}
      ${bt?`<div class="tdtc"><div class="dl">Bonus</div><div class="dv g">-${bt.toFixed(1)}s</div></div>`:''}
    </div>`;
  }

  const inp=ed?`<div class="ti">
    <input class="tinp" type="text" value="${isNaN(tid)?'':tid}" placeholder="Tag ID" data-gp="${p.gp_id}"
      onblur="saveTag(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();saveTag(this)}"/>
    <div class="thi" id="h-${p.gp_id}"></div>
  </div>`:'';

  return`<div class="card${racing?' rcg':''}" id="card-${tid}" style="--cc:${col}">
    <div class="chdr"><div class="cdot"></div><div class="cnm">${p.player_name}</div>${!isNaN(tid)?`<span class="ctg">#${tid}</span>`:''}</div>
    ${pos}${tb}${inp}
  </div>`;
}

// Surgical patch: replace only the matching card element
function patchCard(tid){
  const existing=document.getElementById('card-'+tid);
  if(!existing){renderPlayers();return}
  const idx=players.findIndex(p=>+p.tag_id===tid);
  if(idx<0){renderPlayers();return}
  const tmp=document.createElement('div');
  tmp.innerHTML=buildCard(players[idx],idx,canEdit(),Date.now());
  existing.replaceWith(tmp.firstElementChild);
}

// ═══════════════════════════ POPUPS & TOASTS ══════════════════════
function popup(tid,lbl,name,t,col,type){
  const d=tagData[tid];if(!d)return;
  const w=document.getElementById('pops'),r=cv.getBoundingClientRect();
  const p=tp(d.x,d.y);
  const el=document.createElement('div');el.className='pop';
  el.style.left=(p.px*(r.width/cv.width))+'px';el.style.top=((p.py-18)*(r.height/cv.height))+'px';
  const bc=type==='fin'?'var(--grn)':type==='go'?'var(--acc)':'var(--yel)';
  const tc=type==='fin'?'#00ff88':type==='go'?'#00d4ff':'#ffd700';
  el.innerHTML=`<div class="pop-in" style="border-color:${bc}"><div class="pop-lb">${lbl}</div><div class="pop-nm" style="color:${col}">${name}</div>${t!=null?`<div class="pop-tm" style="color:${tc}">${fT(t)}</div>`:''}</div>`;
  w.appendChild(el);setTimeout(()=>el.remove(),3100);
}
function toast(msg,type){
  const el=document.createElement('div');el.className=`toast t${type}`;el.textContent=msg;
  document.getElementById('tv').appendChild(el);setTimeout(()=>el.remove(),3200);
}
function flash(tid,type){
  const d=tagData[tid];if(!d)return;
  if(type==='wall'){d.flashWall=true;setTimeout(()=>d.flashWall=false,1800)}
  else{d.flashCar=true;setTimeout(()=>d.flashCar=false,1800)}
}

// ═══════════════════════════ API ══════════════════════════════════
const csrf=()=>{const m=document.cookie.match(/csrftoken=([^;]+)/);return m?m[1]:''};
async function apiFetch(url){try{const r=await fetch(url,{credentials:'include'});return r.json()}catch{return{data:[]}}}
async function apiPatch(url,body){const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json','X-CSRFToken':csrf()},credentials:'include',body:JSON.stringify(body)});return r.json()}

async function loadTournaments(){
  const{data}=await apiFetch(BASE+'/api/tournaments/');const s=document.getElementById('tSel');
  (data||[]).forEach(t=>{const o=document.createElement('option');o.value=t.slug;o.textContent=t.name;s.appendChild(o)});
}
async function loadGroups(){
  const slug=document.getElementById('tSel').value,gs=document.getElementById('gSel');
  gs.innerHTML='<option value="">— Group —</option>';gs.disabled=true;curGroup=null;curStatus='';players=[];reassign=false;
  setBadge('');updBtns();renderPlayers();renderLB();
  ['cpW','cpA','cpV'].forEach(id=>document.getElementById(id).style.display='none');
  if(!slug)return;
  const{data}=await apiFetch(BASE+'/api/tournament-structure/?slug='+slug);if(!data?.rounds)return;
  curTotalLaps=data.total_laps||10;
  WPEN=parseFloat(data.object_collision_time)||5;APEN=parseFloat(data.collision_creating_time)||5;VBON=parseFloat(data.collision_absorbing_time)||2;
  raceConfig={total_laps:curTotalLaps,collision_absorbing_time:VBON,collision_creating_time:APEN,object_collision_time:WPEN};
  ['cpW','cpA','cpV'].forEach(id=>document.getElementById(id).style.display='inline');
  document.getElementById('cpW').textContent=`🚧+${WPEN}s`;document.getElementById('cpA').textContent=`💥+${APEN}s`;document.getElementById('cpV').textContent=`🛡-${VBON}s`;
  rDB();gs.disabled=false;
  data.rounds.forEach(r=>{const og=document.createElement('optgroup');og.label=`R${r.round_no} — ${r.round_name}`;r.groups.forEach(g=>{const o=document.createElement('option');o.value=g.group_id;o.dataset.st=g.group_status||'';o.textContent=g.group_name+(g.group_status?` [${g.group_status}]`:'');og.appendChild(o)});gs.appendChild(og)});
}
async function selectGroup(){
  const gs=document.getElementById('gSel');curGroup=gs.value||null;reassign=false;
  if(!curGroup){players=[];curStatus='';setBadge('');updBtns();renderPlayers();renderLB();return}
  const opt=gs.options[gs.selectedIndex];curStatus=opt.dataset.st||'';setBadge(curStatus);updBtns();
  const{data}=await apiFetch(BASE+'/api/group-players/?group_id='+curGroup);
  players=(data||[]).map(p=>({...p,tag_id:(p.tag_id!=null&&p.tag_id!=='')?+p.tag_id:null}));
  rDB();renderPlayers();renderLB();
}
function tagMap(){const m={};players.forEach(p=>{if(p.tag_id!=null)m[String(p.tag_id)]=p.gp_id});return m}

async function doLive(){
  if(!curGroup)return;
  const r=await apiPatch(BASE+'/api/mark-group-live/',{group_id:curGroup});if(!r.success){alert('Failed');return}
  curStatus='live';reassign=false;setBadge('live');updBtns();
  const gs=document.getElementById('gSel'),opt=gs.options[gs.selectedIndex];
  opt.dataset.st='live';opt.textContent=opt.textContent.replace(/\s*\[.*?\]/,'')+' [live]';
  sendWS({type:'admin_start',group_id:+curGroup,total_laps:curTotalLaps,tag_map:tagMap(),race_config:raceConfig});
  addFeed([`▶ LIVE G${curGroup} ${curTotalLaps}L`]);renderPlayers();
}
async function doFinish(){
  if(!curGroup||!confirm('Mark finished?'))return;
  const r=await apiPatch(BASE+'/api/mark-group-finished/',{group_id:curGroup});if(!r.success){alert('Failed');return}
  curStatus='finished';setBadge('finished');
  const gs=document.getElementById('gSel'),opt=gs.options[gs.selectedIndex];
  opt.dataset.st='finished';opt.textContent=opt.textContent.replace(/\s*\[.*?\]/,'')+' [finished]';
  sendWS({type:'reset'});Object.values(tagData).forEach(d=>{d.isRacing=false;d.lapStartMs=null;d.lapTrail=[]});
  lbData=[];reassign=true;updBtns();renderLB();renderPlayers();addFeed(['⏹ Finished']);
}
function doReset(){
  if(!curGroup||!confirm('Reset race?'))return;
  sendWS({type:'reset'});
  Object.keys(tagData).forEach(k=>{const d=tagData[k];Object.assign(d,{isRacing:false,isFinished:false,lapStartMs:null,lapNum:0,bestElp:null,lapsDone:0,lapTrail:[],ghost:null,wallHits:0,carHits:0,penCur:0,bonCur:0,flashWall:false,flashCar:false,lapInfo:null})});
  lbData=[];reassign=true;updBtns();renderLB();renderPlayers();addFeed(['↺ Reset — reassign tags then ▶ Restart']);
}
function setBadge(s){const e=document.getElementById('gBadge'),m={live:['blv','LIVE'],finished:['bdn','FINISHED']};const[c,l]=m[s]||['bdf',s?s.toUpperCase():''];e.className='badge '+(reassign?'bra':c);e.textContent=reassign?'REASSIGN':l}
function updBtns(){
  const bL=document.getElementById('btnLive'),bF=document.getElementById('btnFin'),bR=document.getElementById('btnRes');
  const h=!!curGroup,lv=curStatus==='live',dn=curStatus==='finished';
  if(reassign){bL.textContent='▶ Restart Race';bL.disabled=false;bF.disabled=true;bR.disabled=true}
  else if(dn){bL.textContent='▶ Live';bL.disabled=true;bF.disabled=true;bR.disabled=!h}
  else{bL.textContent='▶ Live';bL.disabled=!h||lv;bF.disabled=!lv;bR.disabled=!lv}
}
function canEdit(){return reassign||(curStatus!=='live'&&curStatus!=='finished')}

async function saveTag(input){
  if(!canEdit())return;
  const gp=input.dataset.gp,raw=input.value.trim(),h=document.getElementById('h-'+gp);if(!h)return;
  h.textContent='…';h.className='thi s';
  const r=await apiPatch(BASE+'/api/update-tag-id/',{gp_id:gp,tag_id:raw||null});
  if(r.success){h.textContent='✓';h.className='thi ok';const pl=players.find(p=>p.gp_id==gp);if(pl)pl.tag_id=raw?+raw:null;setTimeout(()=>{h.textContent='';h.className='thi'},2000);rDB()}
  else{h.textContent='✗';h.className='thi e';setTimeout(()=>{h.textContent='';h.className='thi'},2500)}
}

// ═══════════════════════════ DEBUG BAR ════════════════════════════
function dset(id,v,c){const e=document.getElementById(id);if(!e)return;e.textContent=v;if(c)e.className=c}
function rDB(){dset('db_p',pktAll);dset('db_k',Object.keys(tagData).length?Object.keys(tagData).join(','):'—');dset('db_pl',players.length);dset('db_wall',WPEN,'w');dset('db_atk',APEN,'e');dset('db_vic',VBON,'ok')}
setInterval(()=>{
  document.getElementById('sPkt').textContent=pktSec;pktSec=0;
  const now=Date.now(),ac=players.filter(p=>{if(p.tag_id==null)return false;const d=tagData[+p.tag_id];return d&&(now-d.lastMs)<4000}).length;
  document.getElementById('sAct').textContent=ac;rDB();
},1000);

// ═══════════════════════════ RAW MONITOR ══════════════════════════
let rawPause=false,rawTC={};
function rawIn(tid,msg){
  const now=Date.now();if(!rawTC[tid])rawTC[tid]={c:0,ws:now,rate:0,last:now};
  const t=rawTC[tid];t.c++;t.last=now;const el=(now-t.ws)/1000;if(el>=1){t.rate=Math.round(t.c/el);t.c=0;t.ws=now}
  document.getElementById('rawR').textContent=Object.values(rawTC).reduce((s,x)=>s+x.rate,0)+' pkt/s';
  renderRates();if(rawPause)return;
  const log=document.getElementById('rawL'),ts=new Date().toLocaleTimeString('en-GB',{hour12:false})+'.'+String(now%1000).padStart(3,'0');
  const rng=Array.isArray(msg.range)?msg.range.map(r=>String(Math.round(r)).padStart(4,' ')).join(' '):'—';
  const q=msg.quality||'?',qc=['excellent','good','fair'].includes(q)?q:'oob',col=COLS[tid%COLS.length];
  const row=document.createElement('div');row.className='rl';
  row.innerHTML=`<span class="rt">${ts.slice(0,12)}</span><span class="ri" style="color:${col}">T${tid}</span><span class="rxy">${msg.x?.toFixed(0)??'—'},${msg.y?.toFixed(0)??'—'}cm</span><span class="rr">[${rng}]</span><span class="rq ${qc}">${q}</span>`;
  const hdr=log.firstChild;log.insertBefore(row,hdr?hdr.nextSibling:null);
  while(log.children.length>61)log.removeChild(log.lastChild);
}
function renderRates(){
  const w=document.getElementById('rawRT'),now=Date.now(),tids=Object.keys(rawTC).map(Number).sort();if(!tids.length)return;
  const mx=Math.max(1,...tids.map(t=>rawTC[t].rate));
  w.innerHTML=tids.map(tid=>{const t=rawTC[tid],col=COLS[tid%COLS.length],st=(now-t.last)>3000,pct=st?0:Math.min(100,t.rate/mx*100);
    return`<div style="display:flex;align-items:center;gap:3px;background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:2px 5px;font-size:.5rem"><span style="color:${col}">T${tid}</span><span style="color:var(--yel)">${st?'silent':t.rate+'/s'}</span><div style="width:24px;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${col};border-radius:2px;transition:width .3s"></div></div></div>`;
  }).join('');
}
setInterval(renderRates,1000);
function clrRaw(){const l=document.getElementById('rawL');while(l.children.length>1)l.removeChild(l.lastChild);rawTC={};document.getElementById('rawR').textContent='0 pkt/s';document.getElementById('rawRT').innerHTML='<span style="color:var(--dim);font-size:.5rem">waiting…</span>'}
function togRaw(){rawPause=!rawPause;const b=document.getElementById('rawPB');b.textContent=rawPause?'RESUME':'PAUSE';b.style.color=rawPause?'#ff3b5c':'var(--txt)'}

function addFeed(lines){const w=document.getElementById('feed');lines.forEach(l=>{const d=document.createElement('div');d.className='fi hi';d.textContent=l;w.prepend(d);setTimeout(()=>d.classList.remove('hi'),3000)});while(w.children.length>30)w.removeChild(w.lastChild)}
function downloadCSV(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([`ANCHOR,0,0,A0\nANCHOR,610,0,A1\nANCHOR,610,440,A2\nANCHOR,0,440,A3\nSF,200,8,290,108\n`],{type:'text/csv'}));a.download='xrace.csv';a.click();URL.revokeObjectURL(a.href)}

loadTournaments();
</script>
