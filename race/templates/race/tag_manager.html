<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>XRace — Live Race Control</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #080b10;
  --surface: #0d1117;
  --panel:   #111827;
  --border:  #1e2a3a;
  --accent:  #00d4ff;
  --red:     #ff3b5c;
  --green:   #00ff88;
  --yellow:  #ffd700;
  --text:    #e2eaf4;
  --muted:   #4a5568;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;min-height:52px}
.logo{font-size:1.3rem;font-weight:700;letter-spacing:3px;color:var(--accent);white-space:nowrap;margin-right:4px}
.logo span{color:var(--red)}
.topbar select{padding:6px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600;outline:none;cursor:pointer;min-width:130px;flex:1 1 auto;max-width:220px}
.topbar select:focus{border-color:var(--accent)}
.topbar select:disabled{opacity:.4;cursor:not-allowed}
.btn{padding:7px 13px;border-radius:5px;border:none;font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-live{background:var(--green);color:#000}.btn-live:hover:not(:disabled){background:#00cc70}
.btn-finish{background:var(--red);color:#fff}.btn-finish:hover:not(:disabled){background:#c0182e}
.btn-restart{background:var(--yellow);color:#000}.btn-restart:hover:not(:disabled){background:#e6c200}
.badge{font-size:.72rem;padding:4px 10px;border-radius:20px;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;border:1px solid transparent}
.b-live{background:rgba(0,255,136,.12);color:var(--green);border-color:rgba(0,255,136,.3)}
.b-finished{background:rgba(255,59,92,.12);color:var(--red);border-color:rgba(255,59,92,.3)}
.b-reassign{background:rgba(255,215,0,.15);color:var(--yellow);border-color:rgba(255,215,0,.4)}
.b-default{background:rgba(255,255,255,.05);color:var(--muted);border-color:var(--border)}
.ws-pill{font-size:.72rem;padding:4px 10px;border-radius:20px;font-weight:600;white-space:nowrap;border:1px solid transparent}
.ws-ok{background:rgba(0,255,136,.1);color:var(--green);border-color:rgba(0,255,136,.25)}
.ws-fail{background:rgba(255,59,92,.1);color:var(--red);border-color:rgba(255,59,92,.25)}
#dbgBar{background:rgba(0,0,0,.85);border-bottom:1px solid #1e2a3a;padding:4px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:#4a5568;flex-shrink:0;display:flex;gap:16px;flex-wrap:wrap}
#dbgBar span{white-space:nowrap}
#dbgBar .hi{color:#00d4ff}#dbgBar .ok{color:#00ff88}#dbgBar .warn{color:#ffd700}#dbgBar .err{color:#ff3b5c}
#rawMonitor{background:#050810;border-bottom:1px solid #1e2a3a;flex-shrink:0;display:flex;flex-direction:column;font-family:'JetBrains Mono',monospace;max-height:160px}
#rawHeader{display:flex;justify-content:space-between;align-items:center;padding:4px 12px;border-bottom:1px solid #111827;flex-shrink:0}
#rawTagRates{display:flex;gap:6px;padding:4px 12px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid #111827}
.rtag-pill{display:flex;align-items:center;gap:5px;background:#0d1117;border:1px solid #1e2a3a;border-radius:4px;padding:3px 8px;font-size:.62rem}
.rtag-pill .rtag-id{font-weight:700}.rtag-pill .rtag-rate{color:#ffd700}
.rtag-pill .rtag-bar{width:40px;height:5px;background:#1e2a3a;border-radius:2px;overflow:hidden}
.rtag-pill .rtag-fill{height:100%;border-radius:2px;transition:width .3s}
#rawLog{overflow-y:auto;flex:1;padding:2px 0;min-height:60px}
#rawLog::-webkit-scrollbar{width:4px}#rawLog::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:2px}
.rlog-row{display:flex;gap:8px;padding:1px 12px;font-size:.6rem;border-bottom:1px solid rgba(255,255,255,.03);white-space:nowrap;overflow:hidden;align-items:baseline}
.rlog-row:hover{background:rgba(255,255,255,.03)}
.rlog-time{color:#4a5568;width:52px;flex-shrink:0}.rlog-tag{font-weight:700;width:38px;flex-shrink:0}
.rlog-xy{color:#00ff88;width:110px;flex-shrink:0}.rlog-ranges{color:#00d4ff;flex:1}
.rlog-qual{width:52px;flex-shrink:0;text-align:right}
.rlog-qual.excellent{color:#00ff88}.rlog-qual.good{color:#ffd700}.rlog-qual.fair{color:#ff6b35}.rlog-qual.oob{color:#ff3b5c}
.main{display:flex;flex:1;overflow:hidden}
.cv-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{border-radius:8px;border:1px solid var(--border);background:var(--bg);max-width:100%;max-height:100%}
.side{width:292px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.side-hdr{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.side-lbl{font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sbox{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:7px 9px}
.sbox .v{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:600;color:var(--accent);line-height:1}
.sbox .l{font-size:.62rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.players-wrap{flex:1;overflow-y:auto;padding:10px 12px}
.players-wrap::-webkit-scrollbar{width:4px}.players-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.pcard{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:6px;padding:9px 11px;margin-bottom:7px;transition:border-color .2s}
.pcard.active{border-left-color:var(--cc)}.pcard.pulse{animation:kp 2s infinite}
@keyframes kp{0%,100%{opacity:1}50%{opacity:.7}}
.pcard-hdr{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.pcard-dot{width:9px;height:9px;border-radius:50%;background:var(--cc,var(--muted));flex-shrink:0;box-shadow:0 0 6px var(--cc,transparent)}
.pcard-name{font-weight:700;font-size:.9rem;flex:1}
.pcard-tag{font-family:'JetBrains Mono',monospace;font-size:.68rem;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:2px 6px;color:var(--muted)}
.pcard-sub{font-size:.72rem;color:var(--muted);margin-bottom:2px}
.pcard-pos{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--green);font-weight:600}
.pcard-timing{margin-top:6px;background:rgba(0,0,0,0.25);border-radius:5px;padding:7px 9px;border:1px solid rgba(255,255,255,0.06)}
.pcard-timing-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.pcard-timing-row:last-child{margin-bottom:0}
.pcard-timing-label{font-size:.58rem;letter-spacing:1.5px;color:rgba(255,255,255,0.38);text-transform:uppercase}
.pcard-timing-value{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;color:#fff}
.pcard-timing-value.running{color:var(--accent)}.pcard-timing-value.best{color:#ffd700}
.pcard-timing-value.no-data{color:rgba(255,255,255,0.25);font-size:.72rem}
.pcard-cp-row{display:flex;align-items:center;gap:3px;margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,255,255,0.06)}
.pcard-penalty{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
.pen-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:.58rem;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.pen-wall{background:rgba(255,107,53,.15);color:#ff6b35;border:1px solid rgba(255,107,53,.35)}
.pen-car{background:rgba(255,59,92,.15);color:#ff3b5c;border:1px solid rgba(255,59,92,.35)}
.pen-total{background:rgba(255,215,0,.12);color:#ffd700;border:1px solid rgba(255,215,0,.3)}
.pen-bonus{background:rgba(0,255,136,.12);color:#00ff88;border:1px solid rgba(0,255,136,.3)}
.tag-row{margin-top:5px}
.tag-inp{width:100%;padding:5px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;outline:none}
.tag-inp:focus{border-color:var(--accent)}
.tag-hint{font-size:.65rem;color:var(--muted);margin-top:2px;text-align:right;min-height:14px}
.tag-hint.ok{color:var(--green)}.tag-hint.err{color:var(--red)}.tag-hint.saving{color:var(--yellow)}
.ph{color:var(--muted);font-size:.85rem;text-align:center;padding:30px 0;letter-spacing:1px}
.feed-wrap{padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0;max-height:100px;overflow-y:auto}
.feed-wrap::-webkit-scrollbar{width:3px}.feed-wrap::-webkit-scrollbar-thumb{background:var(--border)}
.feed-item{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);padding:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid rgba(255,255,255,.03)}
.feed-item.hi{color:var(--accent)}
@media(max-width:768px){.main{flex-direction:column}.cv-wrap{max-height:45vh;padding:6px}.side{width:100%;border-left:none;border-top:1px solid var(--border)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">X<span>Race</span></div>
  <select id="tSel" onchange="loadGroups()"><option value="">— Tournament —</option></select>
  <select id="gSel" onchange="selectGroup()" disabled><option value="">— Group —</option></select>
  <span class="badge b-default" id="gBadge"></span>
  <button class="btn btn-live" id="btnLive" onclick="doLive()" disabled>▶ Live</button>
  <button class="btn btn-finish" id="btnFinish" onclick="doFinish()" disabled>⏹ Finish</button>
  <button class="btn btn-restart" id="btnRestart" onclick="doRestart()" disabled>↺ Restart</button>
  <span class="ws-pill ws-fail" id="wsPill">● WS</span>
</div>
<div id="dbgBar">
  <span>WS: <span id="d_ws" class="err">disconnected</span></span>
  <span>Pkts recv: <span id="d_pkts" class="hi">0</span></span>
  <span>tagData keys: <span id="d_keys" class="hi">none</span></span>
  <span>Players loaded: <span id="d_players" class="hi">0</span></span>
  <span>Last msg: <span id="d_last" class="warn">—</span></span>
  <span>Last pos: <span id="d_pos" class="ok">—</span></span>
</div>
<div id="rawMonitor">
  <div id="rawHeader">
    <span style="color:#00d4ff;font-weight:700;letter-spacing:2px;font-size:.7rem;">▶ RAW UDP STREAM</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="rawTotalRate" style="color:#ffd700;font-size:.65rem;font-family:'JetBrains Mono',monospace;">0 pkt/s</span>
      <button onclick="clearRawLog()" style="padding:2px 8px;background:#0d1117;border:1px solid #1e2a3a;border-radius:3px;color:#e2eaf4;font-family:'JetBrains Mono',monospace;font-size:.6rem;cursor:pointer;">CLR</button>
      <button onclick="toggleRawMonitor()" id="rawToggleBtn" style="padding:2px 8px;background:#0d1117;border:1px solid #1e2a3a;border-radius:3px;color:#e2eaf4;font-family:'JetBrains Mono',monospace;font-size:.6rem;cursor:pointer;">PAUSE</button>
    </div>
  </div>
  <div id="rawTagRates"><span style="color:#4a5568;font-family:'JetBrains Mono',monospace;font-size:.6rem;align-self:center;">waiting for data…</span></div>
  <div id="rawLog">
    <div class="rlog-row" style="color:#4a5568;">
      <span class="rlog-time">TIME</span><span class="rlog-tag">TAG</span>
      <span class="rlog-xy">X , Y (cm)</span><span class="rlog-ranges">RANGES [A0,A1,A2,A3] cm</span>
      <span class="rlog-qual">QUAL</span>
    </div>
  </div>
</div>
<div class="main">
  <div class="cv-wrap"><canvas id="c" width="860" height="640"></canvas></div>
  <div class="side">
    <div class="side-hdr">
      <div class="side-lbl">System</div>
      <div class="stat-grid">
        <div class="sbox"><div class="v" id="sPkt">0</div><div class="l">Pkt/s</div></div>
        <div class="sbox"><div class="v" id="sActive">0</div><div class="l">Active</div></div>
        <div class="sbox"><div class="v" id="sLaps">—</div><div class="l">Laps</div></div>
        <div class="sbox"><div class="v" id="sGroup">—</div><div class="l">Group</div></div>
      </div>
    </div>
    <div class="side-lbl" style="padding:10px 12px 0;flex-shrink:0">Players &amp; Tags</div>
    <div class="players-wrap" id="players"><p class="ph">Select a group</p></div>
    <div class="feed-wrap" id="feed"></div>
    <div id="lbWrap" style="flex-shrink:0;border-top:1px solid var(--border);padding:8px 12px 10px;">
      <div class="side-lbl" style="margin-bottom:6px;">Best Lap Rankings</div>
      <div id="lbRows"></div>
    </div>
  </div>
</div>
<script>
const BASE   = 'https://xraceapi.zyberspace.in';
const WS_URL = 'ws://localhost:8001/';
const API = {
  list:       BASE+'/api/tournaments/',
  struct:     BASE+'/api/tournament-structure/',
  players:    BASE+'/api/group-players/',
  updateTag:  BASE+'/api/update-tag-id/',
  markLive:   BASE+'/api/mark-group-live/',
  markFinish: BASE+'/api/mark-group-finished/',
};
const ANC = [{x:0,y:0},{x:213,y:0},{x:213,y:205},{x:0,y:240}];
const CSV_TRACK = {
  center:[{x:75,y:120},{x:45,y:120},{x:20,y:120},{x:12,y:160},{x:12,y:200},{x:30,y:222},{x:65,y:233},{x:110,y:237},{x:155,y:233},{x:188,y:218},{x:205,y:190},{x:208,y:155},{x:205,y:120},{x:195,y:90},{x:165,y:70},{x:130,y:62},{x:110,y:60},{x:90,y:62},{x:68,y:70},{x:52,y:85},{x:55,y:105},{x:75,y:120}],
  inner:[{x:63.4,y:112.2},{x:45.0,y:106.0},{x:9.2,y:111.1},{x:-1.9,y:158.6},{x:-1.4,y:203.9},{x:22.6,y:233.9},{x:62.4,y:246.8},{x:110.0,y:251.0},{x:158.3,y:246.6},{x:197.1,y:228.6},{x:218.3,y:194.2},{x:222.0,y:155.0},{x:218.7,y:117.3},{x:205.9,y:81.3},{x:170.5,y:57.1},{x:132.5,y:48.2},{x:110.0,y:46.0},{x:86.8,y:48.4},{x:60.8,y:58.0},{x:38.9,y:80.1},{x:43.3,y:112.7},{x:63.4,y:112.2}],
  outer:[{x:86.6,y:127.8},{x:45.0,y:134.0},{x:30.8,y:128.9},{x:25.9,y:161.4},{x:25.4,y:196.1},{x:37.4,y:210.1},{x:67.6,y:219.2},{x:110.0,y:223.0},{x:151.7,y:219.4},{x:178.9,y:207.4},{x:191.7,y:185.8},{x:194.0,y:155.0},{x:191.3,y:122.7},{x:184.1,y:98.7},{x:159.5,y:82.9},{x:127.5,y:75.8},{x:110.0,y:74.0},{x:93.2,y:75.6},{x:75.2,y:82.0},{x:65.1,y:89.9},{x:66.7,y:97.3},{x:86.6,y:127.8}],
  start:{x1:60,y1:100,x2:60,y2:140},
  checkpoints:[
    {id:0,x:15,y:155,r:20,label:"L-MID"},{id:1,x:15,y:205,r:20,label:"TL-BEND"},
    {id:2,x:65,y:233,r:20,label:"TOP-L"},{id:3,x:110,y:237,r:20,label:"TOP-C"},
    {id:4,x:158,y:233,r:20,label:"TOP-R"},{id:5,x:200,y:200,r:20,label:"TR-BEND"},
    {id:6,x:208,y:155,r:20,label:"R-MID"},{id:7,x:200,y:100,r:20,label:"RB-BEND"},
    {id:8,x:160,y:68,r:20,label:"BOT-R"},{id:9,x:110,y:60,r:20,label:"BOT-C"},
    {id:10,x:60,y:70,r:20,label:"BOT-L"},{id:11,x:52,y:92,r:20,label:"APPROACH"},
  ]
};

// ★ RAW MODE — no EMA, no jump filter, no smoothing anywhere
// tagData.x/y = exactly what the server sends, every packet

const COLORS=['#00d4ff','#ff3b5c','#00ff88','#ffd700','#a855f7','#ff6b35','#00ffcc','#ff9ff3'];
let currentGroupId=null,currentGroupStatus='',currentTotalLaps=10;
let raceConfig={total_laps:10,collision_absorbing_time:null,collision_creating_time:null,object_collision_time:null};
let players=[],csvInnerPoints=[],csvOuterPoints=[],trackPoints=[],tagData={},reassignMode=false,liveLeaderboard=[];
let packetsThisSec=0,totalPackets=0;

function dbg(id,val,cls){const el=document.getElementById(id);if(!el)return;el.textContent=val;if(cls)el.className=cls}
function refreshDebugBar(){dbg('d_pkts',totalPackets);dbg('d_keys',Object.keys(tagData).length?Object.keys(tagData).join(','):'none');dbg('d_players',players.length)}

const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let cScale,cOffX,cOffY;
function calcLayout(){
  const xs=ANC.map(a=>a.x),ys=ANC.map(a=>a.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const w=maxX-minX,h=maxY-minY,pad=60;
  cScale=Math.min((canvas.width-pad*2)/w,(canvas.height-pad*2)/h)*0.95;
  cOffX=(canvas.width-w*cScale)/2-minX*cScale;
  cOffY=(canvas.height-h*cScale)/2-minY*cScale;
}
calcLayout();
function tp(cx,cy){return{px:cOffX+cx*cScale,py:canvas.height-cOffY-cy*cScale}}

function offsetPath(pts,halfW,side){
  const n=pts.length,out=[];
  for(let i=0;i<n;i++){
    const prev=pts[(i-1+n)%n],next=pts[(i+1)%n];
    const tx=next.px-prev.px,ty=next.py-prev.py,tl=Math.hypot(tx,ty)||1;
    const nx=-ty/tl,ny=tx/tl;
    out.push({px:pts[i].px+nx*halfW*side,py:pts[i].py+ny*halfW*side});
  }
  return out;
}
function pathToCtx(path,close){ctx.beginPath();path.forEach((p,i)=>i?ctx.lineTo(p.px,p.py):ctx.moveTo(p.px,p.py));if(close)ctx.closePath()}
function drawCurbs(path,w,close){
  const n=path.length,segs=[];
  for(let i=0;i<n-(close?0:1);i++){const a=path[i],b=path[(i+1)%n];segs.push({a,b,d:Math.hypot(b.px-a.px,b.py-a.py)})}
  const stripeLen=10;let acc=0;
  segs.forEach(({a,b,d})=>{
    let t=0;
    while(t<d){
      const t0=t,t1=Math.min(t+stripeLen-(acc%stripeLen),d),f0=t0/d,f1=t1/d;
      const x0=a.px+(b.px-a.px)*f0,y0=a.py+(b.py-a.py)*f0,x1=a.px+(b.px-a.px)*f1,y1=a.py+(b.py-a.py)*f1;
      const tl2=Math.hypot(b.px-a.px,b.py-a.py)||1,nx=-(b.py-a.py)/tl2*w,ny=(b.px-a.px)/tl2*w;
      ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.lineTo(x1+nx,y1+ny);ctx.lineTo(x0+nx,y0+ny);ctx.closePath();
      ctx.fillStyle=Math.floor(acc/stripeLen)%2===0?'#cc1111':'#ffffff';ctx.fill();
      acc+=(t1-t0);t=t1;
    }
  });
}
function drawCenterLine(pts){ctx.save();ctx.setLineDash([8,12]);ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;ctx.lineJoin='round';pathToCtx(pts,true);ctx.stroke();ctx.setLineDash([]);ctx.restore()}
function drawArrows(pts){
  const n=pts.length,step=Math.max(3,Math.floor(n/8));
  for(let i=0;i<n;i+=step){
    const a=pts[i],b=pts[(i+1)%n],dx=b.px-a.px,dy=b.py-a.py,l=Math.hypot(dx,dy)||1;
    const mx=(a.px+b.px)/2,my=(a.py+b.py)/2,hs=7;
    ctx.save();ctx.translate(mx,my);ctx.rotate(Math.atan2(dy/l,dx/l));
    ctx.beginPath();ctx.moveTo(hs,0);ctx.lineTo(-hs,hs*0.6);ctx.lineTo(-hs*0.3,0);ctx.lineTo(-hs,-hs*0.6);

function generateFallbackTrack(){
  const xs=ANC.map(a=>a.x),ys=ANC.map(a=>a.y);
  const cx=(Math.min(...xs)+Math.max(...xs))/2,cy=(Math.min(...ys)+Math.max(...ys))/2;
  const rx=(Math.max(...xs)-Math.min(...xs))/2*0.78,ry=(Math.max(...ys)-Math.min(...ys))/2*0.78;
  const pts=[];for(let i=0;i<64;i++){const a=i/64*Math.PI*2;pts.push({x:cx+rx*Math.cos(a),y:cy+ry*Math.sin(a)})}
  return pts;
}

let ws,reconnTimer;
function connectWS(){
  if(ws){try{ws.close()}catch(e){}}
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{setPill(true);dbg('d_ws','connected','ok');clearTimeout(reconnTimer);reconnTimer=null};
  ws.onclose=()=>{setPill(false);dbg('d_ws','disconnected','err');if(!reconnTimer)reconnTimer=setTimeout(connectWS,2500)};
  ws.onerror=()=>{setPill(false);dbg('d_ws','error','err')};
  ws.onmessage=(e)=>{
    try{
      const msg=JSON.parse(e.data);dbg('d_last',msg.type,'hi');
      let needPlayerRerender=false;
      if(msg.type==='connection')return;
      if(msg.type==='state_update'){
        document.getElementById('sLaps').textContent=msg.total_laps??'—';
        document.getElementById('sGroup').textContent=msg.group_id??'—';
        if(msg.feed?.length)appendFeed(msg.feed);
        if(msg.leaderboard){liveLeaderboard=msg.leaderboard;renderLeaderboard()}
        if(msg.cars){
          msg.cars.forEach(car=>{
            const tid=parseInt(car.tag_id,10);if(isNaN(tid))return;
            if(!tagData[tid])tagData[tid]={x:0,y:0,trail:[],lastTime:0,speed:0,lapInfo:null,lapStartTime:null,wallHits:0,carHits:0};
            if(car.x!=null)tagData[tid].x=car.x;
            if(car.y!=null)tagData[tid].y=car.y;
            tagData[tid].lastTime=Date.now();
            const prevRacing=tagData[tid].lapInfo?.is_racing;
            tagData[tid].lapInfo=car.lap_info;
            if(car.speed!=null)tagData[tid].speed=car.speed;
            if(car.wall_hits!=null)tagData[tid].wallHits=car.wall_hits;
            if(car.car_collisions!=null)tagData[tid].carHits=car.car_collisions;
            if(prevRacing!==car.lap_info?.is_racing)needPlayerRerender=true;
          });
          refreshDebugBar();
          if(needPlayerRerender){renderPlayers();needPlayerRerender=false}
        }
        return;
      }
      if(msg.type==='tag_position'){
        const tid=parseInt(msg.tag_id,10);if(isNaN(tid))return;
        rawMonitorIngest(tid,msg);
        if(!tagData[tid])tagData[tid]={x:0,y:0,trail:[],lastTime:0,speed:0,lapInfo:null,lapStartTime:null,wallHits:0,carHits:0};

        // ★ RAW MODE: zero filtering — snap directly to exact server value every packet
        tagData[tid].x=msg.x;
        tagData[tid].y=msg.y;

        tagData[tid].speed=msg.speed??tagData[tid].speed;
        tagData[tid].lastTime=Date.now();
        if(msg.wall_hits!=null)tagData[tid].wallHits=msg.wall_hits;
        if(msg.car_collisions!=null)tagData[tid].carHits=msg.car_collisions;
        if(msg.lap_info!=null){
          const prevR=tagData[tid].lapInfo?.is_racing;
          tagData[tid].lapInfo=msg.lap_info;
          if(prevR!==msg.lap_info?.is_racing)setTimeout(renderPlayers,10);
        }
        tagData[tid].trail.push({x:msg.x,y:msg.y});
        if(tagData[tid].trail.length>40)tagData[tid].trail.shift();
        packetsThisSec++;totalPackets++;
        if(totalPackets%20===0){dbg('d_pos',`Tag${tid} (${msg.x.toFixed(0)},${msg.y.toFixed(0)})cm`,'ok');refreshDebugBar()}
        if(msg.game_events?.length){
          appendFeed(msg.game_events.map(ev=>{
            if(ev.type==='lap_done'){
              setTimeout(renderLeaderboard,200);
              const _p=players.find(p=>p.player_name===ev.car_name);
              if(_p&&_p.tag_id!==null){
                const _tid=parseInt(_p.tag_id,10);
                if(!isNaN(_tid)&&tagData[_tid]){
                  tagData[_tid].lapStartTime=Date.now();
                  if(tagData[_tid].lapInfo){tagData[_tid].lapInfo.checkpoints_hit=0;if(tagData[_tid].lapInfo.current_lap)tagData[_tid].lapInfo.current_lap=ev.lap+1}
                  setTimeout(renderPlayers,10);
                }
              }
              if(ev.elp!=null){
                const _tid2=players.find(p=>p.player_name===ev.car_name)?.tag_id;
                const _tid3=_tid2!=null?parseInt(_tid2,10):null;
                let lb=_tid3!=null?liveLeaderboard.find(r=>r.car_id===_tid3):null;
                if(!lb&&_tid3!=null){lb={car_id:_tid3,best_elp:Infinity,best_raw:Infinity,laps_done:0};liveLeaderboard.push(lb)}
                if(lb){if(ev.elp<lb.best_elp)lb.best_elp=ev.elp;if(ev.raw_time<lb.best_raw)lb.best_raw=ev.raw_time;lb.laps_done=(lb.laps_done||0)+1}
              }
              setTimeout(renderLeaderboard,50);
              return `LAP  ${ev.car_name} #${ev.lap}  ${ev.raw_time?.toFixed(2)}s  ELP:${ev.elp?.toFixed(2)}s`;
            }
            if(ev.type==='race_start'){
              const _p=players.find(p=>p.player_name===ev.car_name);
              if(_p&&_p.tag_id!==null){
                const _tid=parseInt(_p.tag_id,10);
                if(!isNaN(_tid)){
                  if(!tagData[_tid])tagData[_tid]={x:0,y:0,trail:[],lastTime:0,speed:0,lapInfo:null,lapStartTime:null,wallHits:0,carHits:0};
                  tagData[_tid].lapStartTime=Date.now();
                  if(!tagData[_tid].lapInfo)tagData[_tid].lapInfo={};
                  tagData[_tid].lapInfo.is_racing=true;tagData[_tid].lapInfo.current_lap=ev.lap||1;
                  tagData[_tid].lapInfo.total_laps=currentTotalLaps;tagData[_tid].lapInfo.checkpoints_hit=0;
                  tagData[_tid].lapInfo.checkpoints_total=CSV_TRACK.checkpoints.length;
                  setTimeout(renderPlayers,10);
                }
              }
              return `START  ${ev.car_name}`;
            }
            if(ev.type==='checkpoint'){
              const _p=players.find(p=>p.player_name===ev.car_name);
              if(_p&&_p.tag_id!==null){const _tid=parseInt(_p.tag_id,10);if(!isNaN(_tid)&&tagData[_tid]?.lapInfo)tagData[_tid].lapInfo.checkpoints_hit=ev.cp_index+1}
              return `CP${ev.cp_index}  ${ev.car_name}`;
            }
            if(ev.type==='race_finish')return `FINISH  ${ev.car_name}`;
            if(ev.type==='wall'){
              const _wp=players.find(p=>p.player_name===ev.car_name);
              if(_wp&&_wp.tag_id!==null){const _wt=parseInt(_wp.tag_id,10);if(!isNaN(_wt)&&tagData[_wt]){tagData[_wt].wallHits=(tagData[_wt].wallHits||0)+1;renderPlayers()}}
              return `🚧 WALL  ${ev.car_name}`;
            }
            if(ev.type==='car'){
              const _cp=players.find(p=>p.player_name===ev.attacker_name);
              if(_cp&&_cp.tag_id!==null){const _ct=parseInt(_cp.tag_id,10);if(!isNaN(_ct)&&tagData[_ct]){tagData[_ct].carHits=(tagData[_ct].carHits||0)+1;renderPlayers()}}
              return `💥 HIT  ${ev.attacker_name} → ${ev.victim_name}`;
            }
            return JSON.stringify(ev);
          }));
        }
        updatePositionLabels();return;
      }
      if(msg.type==='admin_event'){appendFeed([`[${msg.event}] ${msg.message}`]);return}
    }catch(err){console.error('[WS] parse error:',err)}
  };
}
function setPill(ok){const el=document.getElementById('wsPill');el.className='ws-pill '+(ok?'ws-ok':'ws-fail');el.textContent=ok?'● Connected':'● Disconnected'}
connectWS();

setInterval(()=>{
  document.getElementById('sPkt').textContent=packetsThisSec;packetsThisSec=0;
  const now=Date.now(),active=players.filter(p=>{if(p.tag_id===null)return false;const d=tagData[parseInt(p.tag_id,10)];return d&&(now-d.lastTime)<4000}).length;
  document.getElementById('sActive').textContent=active;refreshDebugBar();
},1000);

setInterval(()=>{
  const now=Date.now();
  players.forEach(p=>{
    const tid=parseInt(p.tag_id,10);if(isNaN(tid))return;const d=tagData[tid];if(!d)return;
    const timerEl=document.querySelector(`.lap-timer[data-tag="${tid}"]`);
    if(timerEl&&d.lapStartTime&&d.lapInfo?.is_racing){const elapsed=(now-d.lapStartTime)/1000,m=Math.floor(elapsed/60),s=(elapsed%60).toFixed(2).padStart(5,'0');timerEl.textContent=m>0?`${m}:${s}`:s}
    const bestEl=document.getElementById(`best-${tid}`);
    if(bestEl){const lb=liveLeaderboard.find(r=>r.car_id===tid),bestElp=(lb&&lb.best_elp<1e9)?lb.best_elp:null;if(bestElp!=null){bestEl.textContent=fmtLapTime(bestElp);bestEl.className='pcard-timing-value best'}}
  });

function appendFeed(lines){
  const wrap=document.getElementById('feed');
  lines.forEach(l=>{const div=document.createElement('div');div.className='feed-item hi';div.textContent=l;wrap.prepend(div);setTimeout(()=>div.classList.remove('hi'),3000)});
  while(wrap.children.length>40)wrap.removeChild(wrap.lastChild);
}

async function apiFetch(url){try{const r=await fetch(url,{credentials:'include'});return r.json()}catch(e){console.error(e);return{data:[]}}}
function getCSRF(){const m=document.cookie.match(/csrftoken=([^;]+)/);return m?m[1]:''}
async function apiPatch(url,body){const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json','X-CSRFToken':getCSRF()},credentials:'include',body:JSON.stringify(body)});return r.json()}
function sendWS(payload){if(ws&&ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify(payload))}else{console.warn('[WS] not connected:',payload.type)}}

async function loadTournaments(){
  const{data}=await apiFetch(API.list);const sel=document.getElementById('tSel');
  (data||[]).forEach(t=>{const o=document.createElement('option');o.value=t.slug;o.textContent=t.name;sel.appendChild(o)});
}
async function loadGroups(){
  const slug=document.getElementById('tSel').value,gSel=document.getElementById('gSel');
  gSel.innerHTML='<option value="">— Group —</option>';gSel.disabled=true;
  currentGroupId=null;currentGroupStatus='';players=[];trackPoints=[];csvInnerPoints=[];csvOuterPoints=[];reassignMode=false;
  setBadge('');updateButtons();renderPlayers();if(!slug)return;
  const{data}=await apiFetch(API.struct+'?slug='+slug);if(!data?.rounds)return;
  currentTotalLaps=data.total_laps||10;
  raceConfig={total_laps:data.total_laps||null,collision_absorbing_time:data.collision_absorbing_time??null,collision_creating_time:data.collision_creating_time??null,object_collision_time:data.object_collision_time??null};
  trackPoints=CSV_TRACK.center;csvInnerPoints=CSV_TRACK.inner;csvOuterPoints=CSV_TRACK.outer;
  gSel.disabled=false;
  data.rounds.forEach(r=>{
    const og=document.createElement('optgroup');og.label=`Round ${r.round_no} — ${r.round_name}${r.is_final?' 🏆':''}`;
    r.groups.forEach(g=>{const o=document.createElement('option');o.value=g.group_id;o.dataset.status=g.group_status||'';o.textContent=g.group_name+(g.group_status?` [${g.group_status}]`:'');og.appendChild(o)});
    gSel.appendChild(og);
  });
}
async function selectGroup(){
  const gSel=document.getElementById('gSel');currentGroupId=gSel.value||null;reassignMode=false;
  if(!currentGroupId){players=[];currentGroupStatus='';setBadge('');updateButtons();renderPlayers();return}
  const opt=gSel.options[gSel.selectedIndex];currentGroupStatus=opt.dataset.status||'';setBadge(currentGroupStatus);updateButtons();
  const{data}=await apiFetch(API.players+'?group_id='+currentGroupId);
  players=(data||[]).map(p=>({...p,tag_id:(p.tag_id!==null&&p.tag_id!==undefined&&p.tag_id!=='')?parseInt(p.tag_id,10):null}));
  refreshDebugBar();renderPlayers();
}

function buildTagMap(){const map={};players.forEach(p=>{if(p.tag_id!==null&&p.tag_id!==undefined)map[String(p.tag_id)]=p.gp_id});return map}
async function doLive(){
  if(!currentGroupId)return;const res=await apiPatch(API.markLive,{group_id:currentGroupId});if(!res.success){alert('Failed to mark group live');return}
  currentGroupStatus='live';reassignMode=false;setBadge('live');updateButtons();
  const gSel=document.getElementById('gSel'),opt=gSel.options[gSel.selectedIndex];opt.dataset.status='live';opt.textContent=opt.textContent.replace(/\s*\[.*?\]\s*$/,'')+' [live]';
  sendWS({type:'admin_start',group_id:parseInt(currentGroupId),total_laps:currentTotalLaps,tag_map:buildTagMap(),race_config:raceConfig});
  appendFeed([`▶ Group ${currentGroupId} LIVE – ${currentTotalLaps} laps`]);renderPlayers();
}
async function doFinish(){
  if(!currentGroupId)return;if(!confirm('Mark race as finished?'))return;
  const res=await apiPatch(API.markFinish,{group_id:currentGroupId});if(!res.success){alert('Failed to mark group finished');return}
  currentGroupStatus='finished';setBadge('finished');
  const gSel=document.getElementById('gSel'),opt=gSel.options[gSel.selectedIndex];opt.dataset.status='finished';opt.textContent=opt.textContent.replace(/\s*\[.*?\]\s*$/,'')+' [finished]';
  sendWS({type:'reset'});appendFeed(['⏹ Race finished']);
  Object.keys(tagData).forEach(tid=>{tagData[tid].trail=[];tagData[tid].lapInfo=null;tagData[tid].lapStartTime=null});
  liveLeaderboard=[];renderLeaderboard();reassignMode=true;updateButtons();renderPlayers();
}
function doRestart(){
  if(!currentGroupId)return;if(!confirm('Reset race data?'))return;
  sendWS({type:'reset'});Object.keys(tagData).forEach(tid=>{tagData[tid].trail=[];tagData[tid].lapInfo=null});
  reassignMode=true;appendFeed(['↺ Race reset — reassign tags then click ▶ Restart Race']);renderPlayers();updateButtons();
}

function setBadge(status){
  const el=document.getElementById('gBadge'),map={live:['b-live','LIVE'],finished:['b-finished','FINISHED']};
  const[cls,lbl]=map[status]||['b-default',status?status.toUpperCase():''];
  el.className='badge '+(reassignMode?'b-reassign':cls);el.textContent=reassignMode?'REASSIGN TAGS':lbl;
}
function updateButtons(){
  const btnLive=document.getElementById('btnLive'),btnFinish=document.getElementById('btnFinish'),btnRestart=document.getElementById('btnRestart');
  const has=!!currentGroupId,live=currentGroupStatus==='live',done=currentGroupStatus==='finished';
  if(reassignMode){btnLive.textContent='▶ Restart Race';btnLive.disabled=false;btnFinish.disabled=true;btnRestart.disabled=true}
  else if(done){btnLive.textContent='▶ Live';btnLive.disabled=true;btnFinish.disabled=true;btnRestart.disabled=!has}
  else{btnLive.textContent='▶ Live';btnLive.disabled=!has||live;btnFinish.disabled=!live;btnRestart.disabled=!live}
}
function canEditTags(){return reassignMode||(currentGroupStatus!=='live'&&currentGroupStatus!=='finished')}

function renderPlayers(){
  const wrap=document.getElementById('players');
  if(!players.length){wrap.innerHTML='<p class="ph">No players in this group</p>';return}
  const editable=canEditTags(),now=Date.now();
  const banner=reassignMode?`<div style="background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:6px;padding:8px 10px;margin-bottom:10px;font-size:.78rem;color:var(--yellow);font-weight:600;">↺ Reassign tags below, then click <strong>▶ Restart Race</strong></div>`:'';
  wrap.innerHTML=banner+renderCards(editable,now);
}
function renderCards(editable,now){
  return players.map((p,idx)=>{
    const color=COLORS[idx%COLORS.length],tid=parseInt(p.tag_id,10),d=!isNaN(tid)?tagData[tid]:null;
    const fresh=d&&(now-d.lastTime)<4000,racing=currentGroupStatus==='live'&&!reassignMode&&fresh;
    let posLine='';
    if(racing&&d)posLine=`<div class="pcard-pos" id="ppos-${tid}">x:${d.x.toFixed(0)} y:${d.y.toFixed(0)} · ${(d.speed||0).toFixed(1)} km/h</div>`;
    else if(currentGroupStatus==='live'&&!reassignMode&&!isNaN(tid))posLine=`<div class="pcard-sub" style="color:#fbbf24">Waiting for signal…</div>`;
    let lapLine='';
    if(d?.lapInfo?.is_racing){
      const li=d.lapInfo,cpHit=li.checkpoints_hit||0,cpTotal=li.checkpoints_total||CSV_TRACK.checkpoints.length;
      const lb=liveLeaderboard.find(r=>r.car_id===tid),bestElp=(lb&&lb.best_elp<1e9)?lb.best_elp:null;
      const wallHits=d.wallHits||0,carHits=d.carHits||0,penTot=lb?.penalty_total??0,bonTot=lb?.bonus_total??0;
      let penaltyChips='';
      if(wallHits>0||carHits>0||penTot>0){
        penaltyChips='<div class="pcard-penalty">';
        if(wallHits>0)penaltyChips+=`<span class="pen-chip pen-wall">🚧 ${wallHits}×wall</span>`;
        if(carHits>0)penaltyChips+=`<span class="pen-chip pen-car">💥 ${carHits}×hit</span>`;
        if(penTot>0)penaltyChips+=`<span class="pen-chip pen-total">+${penTot.toFixed(1)}s</span>`;
        if(bonTot>0)penaltyChips+=`<span class="pen-chip pen-bonus">-${bonTot.toFixed(1)}s bonus</span>`;
        penaltyChips+='</div>';
      }
      const cpPips=CSV_TRACK.checkpoints.map(cp=>{
        const done=cp.id<cpHit,next=cp.id===cpHit,col=done?'#00ff88':(next?'#ffd700':'rgba(255,255,255,0.12)'),brd=done?'#00ff88':(next?'#ffd700':'rgba(255,255,255,0.2)');
        return `<span title="CP${cp.id} ${cp.label}" style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${col};border:1.5px solid ${brd};"></span>`;
      }).join('');
      lapLine=`<div class="pcard-timing">
        <div class="pcard-timing-row"><span class="pcard-timing-label">LAP ${li.current_lap} / ${li.total_laps}</span><span class="pcard-timing-label" style="color:rgba(255,255,255,0.2);">CURRENT</span></div>
        <div class="pcard-timing-row"><span class="pcard-timing-value running lap-timer" data-tag="${tid}">0.00</span></div>
        <div class="pcard-timing-row" style="margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,255,255,0.06);">
          <span class="pcard-timing-label">BEST LAP</span>
          ${bestElp!=null?`<span class="pcard-timing-value best" id="best-${tid}">${fmtLapTime(bestElp)}</span>`:`<span class="pcard-timing-value no-data" id="best-${tid}">—</span>`}
        </div>
        <div class="pcard-cp-row"><span style="font-size:.55rem;letter-spacing:1px;color:rgba(255,255,255,0.3);margin-right:4px;">CP</span>${cpPips}<span style="font-size:.58rem;color:rgba(255,255,255,0.3);margin-left:4px;">${cpHit}/${cpTotal}</span></div>
        ${penaltyChips}</div>`;
    } else if(d?.lapInfo?.race_finished){
      const lb=liveLeaderboard.find(r=>r.car_id===tid),bestElp=(lb&&lb.best_elp<1e9)?lb.best_elp:null;
      lapLine=`<div class="pcard-timing"><div class="pcard-timing-row"><span class="pcard-timing-label">FINISHED</span><span style="font-size:.8rem;">🏆</span></div>${bestElp!=null?`<div class="pcard-timing-row"><span class="pcard-timing-label">BEST LAP</span><span class="pcard-timing-value best">${fmtLapTime(bestElp)}</span></div>`:''}</div>`;
    } else if(d?.lapInfo&&!d.lapInfo.is_racing&&d.lapStartTime){
      const lb=liveLeaderboard.find(r=>r.car_id===tid),bestElp=(lb&&lb.best_elp<1e9)?lb.best_elp:null;
      if(bestElp!=null)lapLine=`<div class="pcard-timing"><div class="pcard-timing-row"><span class="pcard-timing-label">BEST LAP</span><span class="pcard-timing-value best">${fmtLapTime(bestElp)}</span></div></div>`;
    }
    const tagInput=editable?`<div class="tag-row"><input class="tag-inp" type="text" value="${!isNaN(tid)?tid:''}" placeholder="Tag ID (number)" data-gp="${p.gp_id}" onblur="saveTag(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();saveTag(this)}"/><div class="tag-hint" id="hint-${p.gp_id}"></div></div>`:'';
    return `<div class="pcard ${racing?'active pulse':''}" style="--cc:${color}"><div class="pcard-hdr"><div class="pcard-dot"></div><div class="pcard-name">${p.player_name}</div>${!isNaN(tid)?`<span class="pcard-tag">#${tid}</span>`:''}</div><div class="pcard-sub">${p.player_status||''}</div>${posLine}${lapLine}${tagInput}</div>`;
  }).join('');
}
function updatePositionLabels(){
  if(currentGroupStatus!=='live'||reassignMode)return;const now=Date.now();
  players.forEach(p=>{
    const tid=parseInt(p.tag_id,10);if(isNaN(tid))return;const d=tagData[tid];if(!d)return;
    const el=document.getElementById('ppos-'+tid);
    if(el&&(now-d.lastTime)<4000)el.textContent=`x:${d.x.toFixed(0)} y:${d.y.toFixed(0)} · ${(d.speed||0).toFixed(1)} km/h`;
    else if(!el&&(now-d.lastTime)<4000)renderPlayers();
  });
}

async function saveTag(input){
  if(!canEditTags())return;const gpId=input.dataset.gp,rawId=input.value.trim();
  const hint=document.getElementById('hint-'+gpId);if(!hint)return;hint.textContent='…';hint.className='tag-hint saving';
  const res=await apiPatch(API.updateTag,{gp_id:gpId,tag_id:rawId||null});
  if(res.success){hint.textContent='✓ Saved';hint.className='tag-hint ok';setTimeout(()=>{hint.textContent='';hint.className='tag-hint'},2000);const player=players.find(p=>p.gp_id==gpId);if(player){player.tag_id=rawId?parseInt(rawId,10):null;refreshDebugBar()}}
  else{hint.textContent='✗ Error';hint.className='tag-hint err';setTimeout(()=>{hint.textContent='';hint.className='tag-hint'},2500)}
}

function fmtLapTime(secs){if(secs==null||secs===Infinity||secs>9000)return'—';const m=Math.floor(secs/60);return m>0?`${m}:${(secs%60).toFixed(3).padStart(6,'0')}`:(secs%60).toFixed(3).padStart(6,'0')}
function renderLeaderboard(){
  const wrap=document.getElementById('lbRows');if(!wrap)return;
  if(!liveLeaderboard.length&&!players.length){wrap.innerHTML='<div style="color:var(--muted);font-size:.75rem;text-align:center;padding:8px 0;">No lap data yet</div>';return}
  const MEDAL_COLORS=['#ffd700','#c0c0c0','#cd7f32'],MEDAL_LABELS=['P1','P2','P3'];
  const ranked=[];
  liveLeaderboard.forEach(lb=>{const player=players.find(p=>p.tag_id!==null&&parseInt(p.tag_id,10)===lb.car_id);ranked.push({lb,player})});
  players.forEach(p=>{if(!ranked.find(r=>r.player===p))ranked.push({lb:null,player:p})});
  wrap.innerHTML=ranked.map(({lb,player},ri)=>{
    if(!player)return'';const idx=players.indexOf(player),color=COLORS[idx%COLORS.length];
    const isTop3=ri<3&&lb,mColor=isTop3?MEDAL_COLORS[ri]:'rgba(255,255,255,0.3)',mLabel=lb?(ri<3?MEDAL_LABELS[ri]:`P${ri+1}`):'—';
    const done=lb&&lb.laps_done>=currentTotalLaps;
    return`<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
      <div style="width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.4);border:2px solid ${mColor};display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span style="font-size:.65rem;font-weight:700;color:${mColor};font-family:'JetBrains Mono',monospace;">${mLabel}</span></div>
      <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:.85rem;color:${color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${player.player_name}${done?'<span style="font-size:.6rem;background:rgba(0,255,136,.15);color:#00ff88;border:1px solid rgba(0,255,136,.3);border-radius:3px;padding:1px 5px;margin-left:4px;">DONE</span>':''}</div>
      <div style="font-size:.65rem;color:var(--muted);margin-top:1px;">${lb?`${lb.laps_done}/${currentTotalLaps} laps`:'not started'}${lb?.penalty_total>0?` · +${lb.penalty_total.toFixed(1)}s pen`:''}</div></div>
      <div style="text-align:right;flex-shrink:0;"><div style="font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;color:${isTop3?mColor:'#fff'};">${fmtLapTime(lb?.best_elp)}</div>${lb?.best_raw&&lb.best_elp!==lb.best_raw?`<div style="font-size:.6rem;color:var(--muted);">raw ${fmtLapTime(lb.best_raw)}</div>`:''}</div>
    </div>`;
  }).join('');
}

const RAW_MAX_ROWS=80;let rawPaused=false,rawTagCounters={};
function rawMonitorIngest(tid,msg){
  const now=Date.now();
  if(!rawTagCounters[tid])rawTagCounters[tid]={count:0,windowStart:now,rate:0,lastTs:now};
  const tc=rawTagCounters[tid];tc.count++;tc.lastTs=now;
  const elapsed=(now-tc.windowStart)/1000;
  if(elapsed>=1.0){tc.rate=Math.round(tc.count/elapsed);tc.count=0;tc.windowStart=now}
  const allRates=Object.values(rawTagCounters).reduce((s,t)=>s+t.rate,0);
  document.getElementById('rawTotalRate').textContent=allRates+' pkt/s';
  renderTagRatePills();if(rawPaused)return;
  const log=document.getElementById('rawLog');
  const timeStr=new Date().toLocaleTimeString('en-GB',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'})+'.'+String(now%1000).padStart(3,'0');
  const ranges=Array.isArray(msg.range)?msg.range.map(r=>String(Math.round(r)).padStart(4,' ')).join(' '):'—';
  const qual=msg.quality||'?',qualCls=qual==='excellent'?'excellent':qual==='good'?'good':qual==='fair'?'fair':'oob';
  const color=COLORS[tid%COLORS.length],xStr=msg.x!=null?msg.x.toFixed(0).padStart(4,' '):'  —',yStr=msg.y!=null?msg.y.toFixed(0).padStart(4,' '):'  —',spd=msg.speed!=null?msg.speed.toFixed(1):'—';
  const row=document.createElement('div');row.className='rlog-row';
  row.innerHTML=`<span class="rlog-time">${timeStr.slice(0,12)}</span><span class="rlog-tag" style="color:${color}">T${tid}</span><span class="rlog-xy">${xStr},${yStr}cm</span><span class="rlog-ranges">[ ${ranges} ]  ${spd}km/h</span><span class="rlog-qual ${qualCls}">${qual}</span>`;
  const header=log.firstChild;log.insertBefore(row,header?header.nextSibling:null);
  while(log.children.length>RAW_MAX_ROWS+1)log.removeChild(log.lastChild);
}
function renderTagRatePills(){
  const wrap=document.getElementById('rawTagRates'),now=Date.now(),tids=Object.keys(rawTagCounters).map(Number).sort();if(!tids.length)return;
  const maxRate=Math.max(1,...tids.map(t=>rawTagCounters[t].rate));
  wrap.innerHTML=tids.map(tid=>{
    const tc=rawTagCounters[tid],color=COLORS[tid%COLORS.length],stale=(now-tc.lastTs)>3000;
    const pct=stale?0:Math.min(100,Math.round(tc.rate/maxRate*100)),rate=stale?'silent':tc.rate+'/s';
    return`<div class="rtag-pill"><span class="rtag-id" style="color:${color}">T${tid}</span><span class="rtag-rate">${rate}</span><div class="rtag-bar"><div class="rtag-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
  }).join('');
}
function toggleRawMonitor(){rawPaused=!rawPaused;const btn=document.getElementById('rawToggleBtn');btn.textContent=rawPaused?'RESUME':'PAUSE';btn.style.color=rawPaused?'#ff3b5c':'#e2eaf4'}
function clearRawLog(){
  const log=document.getElementById('rawLog');while(log.children.length>1)log.removeChild(log.lastChild);
  rawTagCounters={};document.getElementById('rawTotalRate').textContent='0 pkt/s';
  document.getElementById('rawTagRates').innerHTML='<span style="color:#4a5568;font-family:\'JetBrains Mono\',monospace;font-size:.6rem;align-self:center;">waiting for data…</span>';
}
setInterval(renderTagRatePills,1000);

loadTournaments();
console.log('[XRace] RAW MODE active — zero filtering, direct trilateration, no EMA');
