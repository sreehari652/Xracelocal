<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>XRace — Live Race Control</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #080b10;
  --surface: #0d1117;
  --panel:   #111827;
  --border:  #1e2a3a;
  --accent:  #00d4ff;
  --red:     #ff3b5c;
  --green:   #00ff88;
  --yellow:  #ffd700;
  --text:    #e2eaf4;
  --muted:   #4a5568;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;display:flex;flex-direction:column}

.topbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;min-height:52px}
.logo{font-size:1.3rem;font-weight:700;letter-spacing:3px;color:var(--accent);white-space:nowrap;margin-right:4px}
.logo span{color:var(--red)}
.topbar select{padding:6px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600;outline:none;cursor:pointer;min-width:130px;flex:1 1 auto;max-width:220px}
.topbar select:focus{border-color:var(--accent)}
.topbar select:disabled{opacity:.4;cursor:not-allowed}
.btn{padding:7px 13px;border-radius:5px;border:none;font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-live{background:var(--green);color:#000}
.btn-live:hover:not(:disabled){background:#00cc70}
.btn-finish{background:var(--red);color:#fff}
.btn-finish:hover:not(:disabled){background:#c0182e}
.btn-restart{background:var(--yellow);color:#000}
.btn-restart:hover:not(:disabled){background:#e6c200}
.badge{font-size:.72rem;padding:4px 10px;border-radius:20px;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;border:1px solid transparent}
.b-live    {background:rgba(0,255,136,.12);color:var(--green) ;border-color:rgba(0,255,136,.3)}
.b-finished{background:rgba(255,59,92,.12);color:var(--red)   ;border-color:rgba(255,59,92,.3)}
.b-reassign{background:rgba(255,215,0,.15) ;color:var(--yellow);border-color:rgba(255,215,0,.4)}
.b-default {background:rgba(255,255,255,.05);color:var(--muted);border-color:var(--border)}
.ws-pill{font-size:.72rem;padding:4px 10px;border-radius:20px;font-weight:600;white-space:nowrap;border:1px solid transparent}
.ws-ok  {background:rgba(0,255,136,.1);color:var(--green);border-color:rgba(0,255,136,.25)}
.ws-fail{background:rgba(255,59,92,.1);color:var(--red)  ;border-color:rgba(255,59,92,.25)}

#dbgBar{
  background:rgba(0,0,0,.85);border-bottom:1px solid #1e2a3a;
  padding:4px 14px;font-family:'JetBrains Mono',monospace;font-size:.65rem;
  color:#4a5568;flex-shrink:0;display:flex;gap:16px;flex-wrap:wrap;
}
#dbgBar span{white-space:nowrap}
#dbgBar .hi{color:#00d4ff}
#dbgBar .ok{color:#00ff88}
#dbgBar .warn{color:#ffd700}
#dbgBar .err{color:#ff3b5c}

/* ── Raw monitor ── */
#rawMonitor{
  background:#050810;border-bottom:1px solid #1e2a3a;
  flex-shrink:0;display:flex;flex-direction:column;
  font-family:'JetBrains Mono',monospace;
  max-height:160px;
}
#rawHeader{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 12px;border-bottom:1px solid #111827;flex-shrink:0;
}
#rawTagRates{
  display:flex;gap:6px;padding:4px 12px;flex-wrap:wrap;flex-shrink:0;
  border-bottom:1px solid #111827;
}
.rtag-pill{
  display:flex;align-items:center;gap:5px;
  background:#0d1117;border:1px solid #1e2a3a;border-radius:4px;
  padding:3px 8px;font-size:.62rem;
}
.rtag-pill .rtag-id{font-weight:700;}
.rtag-pill .rtag-rate{color:#ffd700;}
.rtag-pill .rtag-bar{
  width:40px;height:5px;background:#1e2a3a;border-radius:2px;overflow:hidden;
}
.rtag-pill .rtag-fill{height:100%;border-radius:2px;transition:width .3s;}
#rawLog{
  overflow-y:auto;flex:1;padding:2px 0;
  min-height:60px;
}
#rawLog::-webkit-scrollbar{width:4px}
#rawLog::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:2px}
.rlog-row{
  display:flex;gap:8px;padding:1px 12px;font-size:.6rem;
  border-bottom:1px solid rgba(255,255,255,.03);
  white-space:nowrap;overflow:hidden;align-items:baseline;
}
.rlog-row:hover{background:rgba(255,255,255,.03)}
.rlog-time{color:#4a5568;width:52px;flex-shrink:0;}
.rlog-tag{font-weight:700;width:38px;flex-shrink:0;}
.rlog-xy{color:#00ff88;width:110px;flex-shrink:0;}
.rlog-ranges{color:#00d4ff;flex:1;}
.rlog-qual{width:52px;flex-shrink:0;text-align:right;}
.rlog-qual.excellent{color:#00ff88}
.rlog-qual.good{color:#ffd700}
.rlog-qual.fair{color:#ff6b35}
.rlog-qual.oob{color:#ff3b5c}

.main{display:flex;flex:1;overflow:hidden}
.cv-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-width:0}
canvas{border-radius:8px;border:1px solid var(--border);background:var(--bg);max-width:100%;max-height:100%}

.side{width:292px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.side-hdr{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.side-lbl{font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sbox{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:7px 9px}
.sbox .v{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:600;color:var(--accent);line-height:1}
.sbox .l{font-size:.62rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.players-wrap{flex:1;overflow-y:auto;padding:10px 12px}
.players-wrap::-webkit-scrollbar{width:4px}
.players-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.pcard{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:6px;padding:9px 11px;margin-bottom:7px;transition:border-color .2s}
.pcard.active{border-left-color:var(--cc)}
.pcard.pulse{animation:kp 2s infinite}
@keyframes kp{0%,100%{opacity:1}50%{opacity:.7}}
.pcard-hdr{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.pcard-dot{width:9px;height:9px;border-radius:50%;background:var(--cc,var(--muted));flex-shrink:0;box-shadow:0 0 6px var(--cc,transparent)}
.pcard-name{font-weight:700;font-size:.9rem;flex:1}
.pcard-tag{font-family:'JetBrains Mono',monospace;font-size:.68rem;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:2px 6px;color:var(--muted)}
.pcard-sub{font-size:.72rem;color:var(--muted);margin-bottom:2px}
.pcard-pos{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--green);font-weight:600}
.pcard-lap{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--yellow);margin-top:2px}
.pcard-timing{margin-top:6px;background:rgba(0,0,0,0.25);border-radius:5px;padding:7px 9px;border:1px solid rgba(255,255,255,0.06)}
.pcard-timing-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.pcard-timing-row:last-child{margin-bottom:0}
.pcard-timing-label{font-size:.58rem;letter-spacing:1.5px;color:rgba(255,255,255,0.38);text-transform:uppercase}
.pcard-timing-value{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;color:#fff}
.pcard-timing-value.running{color:var(--accent)}
.pcard-timing-value.best{color:#ffd700}
.pcard-timing-value.no-data{color:rgba(255,255,255,0.25);font-size:.72rem}
.pcard-cp-row{display:flex;align-items:center;gap:3px;margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,255,255,0.06)}
.tag-row{margin-top:5px}
.tag-inp{width:100%;padding:5px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;outline:none}
.tag-inp:focus{border-color:var(--accent)}
.tag-hint{font-size:.65rem;color:var(--muted);margin-top:2px;text-align:right;min-height:14px}
.tag-hint.ok{color:var(--green)}.tag-hint.err{color:var(--red)}.tag-hint.saving{color:var(--yellow)}
.ph{color:var(--muted);font-size:.85rem;text-align:center;padding:30px 0;letter-spacing:1px}

.feed-wrap{padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0;max-height:100px;overflow-y:auto}
.feed-wrap::-webkit-scrollbar{width:3px}
.feed-wrap::-webkit-scrollbar-thumb{background:var(--border)}
.feed-item{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);padding:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid rgba(255,255,255,.03)}
.feed-item.hi{color:var(--accent)}

@media(max-width:768px){
  .main{flex-direction:column}
  .cv-wrap{max-height:45vh;padding:6px}
  .side{width:100%;border-left:none;border-top:1px solid var(--border)}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">X<span>Race</span></div>
  <select id="tSel" onchange="loadGroups()"><option value="">— Tournament —</option></select>
  <select id="gSel" onchange="selectGroup()" disabled><option value="">— Group —</option></select>
  <span class="badge b-default" id="gBadge"></span>
  <button class="btn btn-live"    id="btnLive"    onclick="doLive()"    disabled>▶ Live</button>
  <button class="btn btn-finish"  id="btnFinish"  onclick="doFinish()"  disabled>⏹ Finish</button>
  <button class="btn btn-restart" id="btnRestart" onclick="doRestart()" disabled>↺ Restart</button>
  <span class="ws-pill ws-fail" id="wsPill">● WS</span>
</div>

<div id="dbgBar">
  <span>WS: <span id="d_ws" class="err">disconnected</span></span>
  <span>Pkts recv: <span id="d_pkts" class="hi">0</span></span>
  <span>tagData keys: <span id="d_keys" class="hi">none</span></span>
  <span>Players loaded: <span id="d_players" class="hi">0</span></span>
  <span>Last msg: <span id="d_last" class="warn">—</span></span>
  <span>Last pos: <span id="d_pos" class="ok">—</span></span>
</div>

<!-- ══ RAW DATA MONITOR ══ -->
<div id="rawMonitor">
  <div id="rawHeader">
    <span style="color:#00d4ff;font-weight:700;letter-spacing:2px;font-size:.7rem;">▶ RAW UDP STREAM</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="rawTotalRate" style="color:#ffd700;font-size:.65rem;font-family:'JetBrains Mono',monospace;">0 pkt/s</span>
      <button onclick="clearRawLog()" style="padding:2px 8px;background:#0d1117;border:1px solid #1e2a3a;border-radius:3px;color:#e2eaf4;font-family:'JetBrains Mono',monospace;font-size:.6rem;cursor:pointer;">CLR</button>
      <button onclick="toggleRawMonitor()" id="rawToggleBtn" style="padding:2px 8px;background:#0d1117;border:1px solid #1e2a3a;border-radius:3px;color:#e2eaf4;font-family:'JetBrains Mono',monospace;font-size:.6rem;cursor:pointer;">PAUSE</button>
    </div>
  </div>
  <div id="rawTagRates">
    <span style="color:#4a5568;font-family:'JetBrains Mono',monospace;font-size:.6rem;align-self:center;">waiting for data…</span>
  </div>
  <div id="rawLog">
    <div class="rlog-row" style="color:#4a5568;">
      <span class="rlog-time">TIME</span>
      <span class="rlog-tag">TAG</span>
      <span class="rlog-xy">X , Y (cm)</span>
      <span class="rlog-ranges">RANGES [A0, A1, A2, A3] cm</span>
      <span class="rlog-qual">QUAL</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="cv-wrap">
    <canvas id="c" width="860" height="640"></canvas>
  </div>
  <div class="side">
    <div class="side-hdr">
      <div class="side-lbl">System</div>
      <div class="stat-grid">
        <div class="sbox"><div class="v" id="sPkt">0</div><div class="l">Pkt/s</div></div>
        <div class="sbox"><div class="v" id="sActive">0</div><div class="l">Active</div></div>
        <div class="sbox"><div class="v" id="sLaps">—</div><div class="l">Laps</div></div>
        <div class="sbox"><div class="v" id="sGroup">—</div><div class="l">Group</div></div>
      </div>
    </div>
    <div class="side-lbl" style="padding:10px 12px 0;flex-shrink:0">Players &amp; Tags</div>
    <div class="players-wrap" id="players"><p class="ph">Select a group</p></div>
    <div class="feed-wrap" id="feed"></div>
    <div id="lbWrap" style="flex-shrink:0;border-top:1px solid var(--border);padding:8px 12px 10px;">
      <div class="side-lbl" style="margin-bottom:6px;">Best Lap Rankings</div>
      <div id="lbRows"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const BASE   = 'https://xraceapi.zyberspace.in';
const WS_URL = 'ws://localhost:8001/';

const API = {
  list:       BASE + '/api/tournaments/',
  struct:     BASE + '/api/tournament-structure/',
  players:    BASE + '/api/group-players/',
  updateTag:  BASE + '/api/update-tag-id/',
  markLive:   BASE + '/api/mark-group-live/',
  markFinish: BASE + '/api/mark-group-finished/',
};

// ★ ANCHOR POSITIONS — must match ws_bridge.py ANCHOR_POSITIONS
const ANC = [
  {x:0,   y:0},    // A0 bottom-left
  {x:213, y:0},    // A1 bottom-right
  {x:213, y:205},  // A2 top-right
  {x:0,   y:240},  // A3 top-left
];

// ═══════════════════════════════════════════════════════════
// ★ EMBEDDED TRACK  (arena cm coords — matches ws_bridge.py CHECKPOINTS/START_LINE)
// ═══════════════════════════════════════════════════════════
const CSV_TRACK = {
  center: [
    {x:60,y:120},{x:60,y:180},{x:30,y:210},{x:60,y:230},{x:110,y:235},
    {x:160,y:230},{x:195,y:210},{x:205,y:160},{x:195,y:110},
    {x:160,y:80},{x:110,y:70},{x:80,y:80},{x:60,y:100},{x:60,y:120}
  ],
  inner: [
    {x:42.5,y:115.9},{x:43.4,y:173.1},{x:12.1,y:211.8},{x:53.9,y:246.9},
    {x:110,y:253},{x:165.5,y:247.1},{x:209.6,y:220.5},{x:223,y:160},
    {x:210.5,y:100.9},{x:167.9,y:63.8},{x:108.9,y:52},{x:68.2,y:66.4},
    {x:42.5,y:115.9}
  ],
  outer: [
    {x:77.5,y:124.1},{x:76.6,y:186.9},{x:47.9,y:208.2},{x:66.1,y:213.1},
    {x:110,y:217},{x:154.5,y:212.9},{x:180.4,y:199.5},{x:187,y:160},
    {x:179.5,y:119.1},{x:152.1,y:96.2},{x:111.1,y:88},{x:91.8,y:93.6},
    {x:77.5,y:124.1}
  ],
  // S/F line: car crosses LEFT→RIGHT (x increases past 60) to count
  start: {x1:60, y1:100, x2:60, y2:140},
  // Mandatory checkpoints — must hit ALL in order CP0→CP1→CP2→CP3 before S/F counts
  checkpoints: [
    {id:0, x:110, y:232, r:28, label:'TOP'},
    {id:1, x:200, y:155, r:28, label:'RIGHT'},
    {id:2, x:110, y:73,  r:28, label:'BOTTOM'},
    {id:3, x:33,  y:130, r:28, label:'LEFT'},
  ]
};

// ═══════════════════════════════════════════════════════════
// ★ POSITION FILTER — tuned for WiFi UWB (noisier than wired)
//   MAX_JUMP_CM  — drop packet if car jumps more than this per step
//   EMA_ALPHA    — smoothing (lower = smoother but more lag)
// ═══════════════════════════════════════════════════════════
const MAX_JUMP_CM = 80;
const EMA_ALPHA   = 0.28;

const COLORS = [
  '#00d4ff','#ff3b5c','#00ff88','#ffd700',
  '#a855f7','#ff6b35','#00ffcc','#ff9ff3',
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentGroupId     = null;
let currentGroupStatus = '';
let currentTotalLaps   = 10;
let raceConfig = {
  total_laps: 10,
  collision_absorbing_time: null,
  collision_creating_time:  null,
  object_collision_time:    null,
};
let players         = [];
let csvInnerPoints  = [];
let csvOuterPoints  = [];
let trackPoints     = [];
let tagData         = {};
let reassignMode    = false;
let liveLeaderboard = [];
let packetsThisSec  = 0;
let totalPackets    = 0;

// ═══════════════════════════════════════════════════════════
// DEBUG
// ═══════════════════════════════════════════════════════════
function dbg(id, val, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
  if (cls) el.className = cls;
}
function refreshDebugBar() {
  dbg('d_pkts',    totalPackets);
  dbg('d_keys',    Object.keys(tagData).length ? Object.keys(tagData).join(',') : 'none');
  dbg('d_players', players.length);
}

// ═══════════════════════════════════════════════════════════
// CANVAS LAYOUT
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let cScale, cOffX, cOffY;

function calcLayout() {
  const xs = ANC.map(a=>a.x), ys = ANC.map(a=>a.y);
  const minX=Math.min(...xs), maxX=Math.max(...xs);
  const minY=Math.min(...ys), maxY=Math.max(...ys);
  const w=maxX-minX, h=maxY-minY, pad=60;
  cScale = Math.min((canvas.width-pad*2)/w, (canvas.height-pad*2)/h) * 0.95;
  cOffX  = (canvas.width  - w*cScale)/2 - minX*cScale;
  cOffY  = (canvas.height - h*cScale)/2 - minY*cScale;
}
calcLayout();

// UWB: Y=0 bottom → canvas: Y=0 top  (flip Y)
function tp(cx, cy) {
  return { px: cOffX + cx*cScale, py: canvas.height - cOffY - cy*cScale };
}

// ═══════════════════════════════════════════════════════════
// TRACK DRAW HELPERS
// ═══════════════════════════════════════════════════════════
function offsetPath(pts, halfW, side) {
  const n=pts.length, out=[];
  for (let i=0; i<n; i++) {
    const prev=pts[(i-1+n)%n], next=pts[(i+1)%n];
    const tx=next.px-prev.px, ty=next.py-prev.py;
    const tl=Math.hypot(tx,ty)||1;
    const nx=-ty/tl, ny=tx/tl;
    out.push({ px: pts[i].px + nx*halfW*side, py: pts[i].py + ny*halfW*side });
  }
  return out;
}

function pathToCtx(path, close) {
  ctx.beginPath();
  path.forEach((p,i) => i ? ctx.lineTo(p.px,p.py) : ctx.moveTo(p.px,p.py));
  if (close) ctx.closePath();
}

function drawCurbs(path, w, close) {
  const n=path.length, segs=[];
  for (let i=0; i<n-(close?0:1); i++) {
    const a=path[i], b=path[(i+1)%n];
    segs.push({ a, b, d: Math.hypot(b.px-a.px, b.py-a.py) });
  }
  const stripeLen=10; let acc=0;
  segs.forEach(({a,b,d}) => {
    let t=0;
    while (t<d) {
      const t0=t, t1=Math.min(t+stripeLen-(acc%stripeLen), d);
      const f0=t0/d, f1=t1/d;
      const x0=a.px+(b.px-a.px)*f0, y0=a.py+(b.py-a.py)*f0;
      const x1=a.px+(b.px-a.px)*f1, y1=a.py+(b.py-a.py)*f1;
      const tl2=Math.hypot(b.px-a.px, b.py-a.py)||1;
      const nx=-(b.py-a.py)/tl2*w, ny=(b.px-a.px)/tl2*w;
      ctx.beginPath();
      ctx.moveTo(x0,y0); ctx.lineTo(x1,y1);
      ctx.lineTo(x1+nx,y1+ny); ctx.lineTo(x0+nx,y0+ny);
      ctx.closePath();
      ctx.fillStyle = Math.floor(acc/stripeLen)%2===0 ? '#cc1111' : '#ffffff';
      ctx.fill();
      acc+=(t1-t0); t=t1;
    }
  });
}

function drawCenterLine(pts) {
  ctx.save();
  ctx.setLineDash([8,12]);
  ctx.strokeStyle='rgba(255,255,255,0.25)';
  ctx.lineWidth=1; ctx.lineJoin='round';
  pathToCtx(pts,true); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

function drawArrows(pts) {
  const n=pts.length, step=Math.max(3,Math.floor(n/8));
  for (let i=0; i<n; i+=step) {
    const a=pts[i], b=pts[(i+1)%n];
    const dx=b.px-a.px, dy=b.py-a.py, l=Math.hypot(dx,dy)||1;
    const mx=(a.px+b.px)/2, my=(a.py+b.py)/2, hs=7;
    ctx.save();
    ctx.translate(mx,my); ctx.rotate(Math.atan2(dy/l,dx/l));
    ctx.beginPath();
    ctx.moveTo(hs,0); ctx.lineTo(-hs,hs*0.6); ctx.lineTo(-hs*0.3,0); ctx.lineTo(-hs,-hs*0.6);
    ctx.closePath(); ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fill();
    ctx.restore();
  }
}

function generateFallbackTrack() {
  const xs=ANC.map(a=>a.x), ys=ANC.map(a=>a.y);
  const cx=(Math.min(...xs)+Math.max(...xs))/2, cy=(Math.min(...ys)+Math.max(...ys))/2;
  const rx=(Math.max(...xs)-Math.min(...xs))/2*0.78, ry=(Math.max(...ys)-Math.min(...ys))/2*0.78;
  const pts=[];
  for (let i=0; i<64; i++) {
    const a=i/64*Math.PI*2;
    pts.push({ x: cx+rx*Math.cos(a), y: cy+ry*Math.sin(a) });
  }
  return pts;
}

// ═══════════════════════════════════════════════════════════
// MAIN DRAW LOOP
// ═══════════════════════════════════════════════════════════
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Grass background
  ctx.fillStyle='#0e1a0e';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(255,255,255,0.012)';
  for (let gx=0; gx<canvas.width; gx+=18)
    for (let gy=0; gy<canvas.height; gy+=18)
      if ((gx+gy)%36===0) ctx.fillRect(gx,gy,18,18);

  // Arena boundary
  ctx.strokeStyle='rgba(0,212,255,0.15)';
  ctx.lineWidth=2; ctx.setLineDash([8,10]);
  ctx.beginPath();
  ANC.forEach((a,i) => { const p=tp(a.x,a.y); i ? ctx.lineTo(p.px,p.py) : ctx.moveTo(p.px,p.py); });
  ctx.closePath(); ctx.stroke(); ctx.setLineDash([]);

  // ── Track rendering ──
  const trackToUse = trackPoints.length>2 ? trackPoints : generateFallbackTrack();
  if (trackToUse.length>2) {
    const ctrPx  = trackToUse.map(pt => tp(pt.x, pt.y));
    const halfPx = 30*cScale;

    // ★ Prefer explicit CSV inner/outer over computed offsetPath
    const hasCSV    = csvOuterPoints.length>2 && csvInnerPoints.length>2;
    const outerRoad = hasCSV ? csvOuterPoints.map(pt=>tp(pt.x,pt.y)) : offsetPath(ctrPx,halfPx,1);
    const innerRoad = hasCSV ? csvInnerPoints.map(pt=>tp(pt.x,pt.y)) : offsetPath(ctrPx,halfPx,-1);
    const outerPx   = offsetPath(outerRoad, 5,  1);
    const innerPx   = offsetPath(innerRoad, 5, -1);

    // Infield
    ctx.save();
    pathToCtx(innerRoad,true);
    ctx.fillStyle='#162916'; ctx.fill(); ctx.clip();
    ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=6;
    for (let s=-canvas.height; s<canvas.width+canvas.height; s+=20) {
      ctx.beginPath(); ctx.moveTo(s,0); ctx.lineTo(s+canvas.height,canvas.height); ctx.stroke();
    }
    ctx.restore();

    // Asphalt surface
    if (hasCSV) {
      // Fill ring between outer and inner roads
      ctx.save();
      ctx.lineJoin='round'; ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=14;
      ctx.beginPath();
      outerRoad.forEach((p,i) => i ? ctx.lineTo(p.px,p.py) : ctx.moveTo(p.px,p.py));
      ctx.closePath();
      const rev=[...innerRoad].reverse();
      rev.forEach(p => ctx.lineTo(p.px,p.py));
      ctx.closePath();
      ctx.fillStyle='#2e2e2e';
      ctx.fill('evenodd');
      ctx.shadowBlur=0;
      ctx.restore();
    } else {
      ctx.save();
      ctx.lineJoin='round'; ctx.lineCap='round';
      ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=14;
      pathToCtx(ctrPx,true);
      ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=halfPx*2; ctx.stroke();
      ctx.shadowBlur=0;
      pathToCtx(ctrPx,true);
      ctx.strokeStyle='#323232'; ctx.lineWidth=halfPx*2-2; ctx.stroke();
      ctx.restore();
    }

    drawCurbs(outerPx, 5, true);
    drawCurbs(innerPx, 4, true);

    ctx.save(); ctx.lineJoin='round';
    pathToCtx(outerRoad,true);
    ctx.strokeStyle='rgba(255,255,255,0.75)'; ctx.lineWidth=2; ctx.stroke();
    pathToCtx(innerRoad,true); ctx.stroke();
    ctx.restore();

    drawCenterLine(ctrPx);
    drawArrows(ctrPx);

    // S/F line — use CSV start segment
    const sfP1 = tp(CSV_TRACK.start.x1, CSV_TRACK.start.y1);
    const sfP2 = tp(CSV_TRACK.start.x2, CSV_TRACK.start.y2);
    const sfDx=sfP2.px-sfP1.px, sfDy=sfP2.py-sfP1.py;
    const sfLen=Math.hypot(sfDx,sfDy)||1;
    const sfMx=(sfP1.px+sfP2.px)/2, sfMy=(sfP1.py+sfP2.py)/2;
    const tgX=sfDx/sfLen, tgY=sfDy/sfLen;
    const nxSf=-sfDy/sfLen, nySf=sfDx/sfLen;
    const sqS=8, sqN=5;
    for (let row=0; row<3; row++) {
      for (let col=0; col<sqN; col++) {
        const t2=(col-sqN/2)*sqS, r2=(row-1)*sqS;
        ctx.save();
        ctx.translate(sfMx+nxSf*t2+tgX*r2, sfMy+nySf*t2+tgY*r2);
        ctx.rotate(Math.atan2(tgY,tgX));
        ctx.fillStyle=(row+col)%2===0?'#ffffff':'#111111';
        ctx.fillRect(-sqS/2,-sqS/2,sqS,sqS);
        ctx.restore();
      }
    }
    ctx.shadowColor='rgba(255,215,0,0.9)'; ctx.shadowBlur=8;
    ctx.fillStyle='#ffd700';
    ctx.font='bold 11px JetBrains Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('S/F', sfMx+nxSf*22, sfMy+nySf*22);
    ctx.shadowBlur=0;

    // ── Direction arrow near S/F (right→left = valid crossing direction) ──
    const arrowFrom = tp(76, 120);   // right side
    const arrowTo   = tp(44, 120);   // left side
    ctx.save();
    ctx.strokeStyle='rgba(255,215,0,0.8)'; ctx.lineWidth=2;
    ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(arrowFrom.px, arrowFrom.py); ctx.lineTo(arrowTo.px, arrowTo.py); ctx.stroke();
    ctx.setLineDash([]);
    // Arrowhead
    const adx = arrowTo.px - arrowFrom.px, ady = arrowTo.py - arrowFrom.py;
    const alen = Math.hypot(adx, ady);
    const anx = adx/alen, any = ady/alen;
    const ahs = 7;
    ctx.beginPath();
    ctx.moveTo(arrowTo.px, arrowTo.py);
    ctx.lineTo(arrowTo.px - anx*ahs + any*ahs*0.5, arrowTo.py - any*ahs - anx*ahs*0.5);
    ctx.lineTo(arrowTo.px - anx*ahs - any*ahs*0.5, arrowTo.py - any*ahs + anx*ahs*0.5);
    ctx.closePath();
    ctx.fillStyle='rgba(255,215,0,0.8)'; ctx.fill();
    ctx.restore();
  }

  // ── Checkpoints ──
  if (CSV_TRACK.checkpoints) {
    // Collect per-car checkpoint progress from tagData
    const cpHitMax = {}; // cpId → max hits across all active cars (for glow)
    Object.values(tagData).forEach(d => {
      const hit = (d.lap_info && d.lap_info.checkpoints_hit) ? d.lap_info.checkpoints_hit : 0;
      CSV_TRACK.checkpoints.forEach(cp => {
        if (!cpHitMax[cp.id]) cpHitMax[cp.id] = 0;
        if (cp.id < hit) cpHitMax[cp.id] = Math.max(cpHitMax[cp.id], 1);
      });
    });

    CSV_TRACK.checkpoints.forEach(cp => {
      const p = tp(cp.x, cp.y);
      const pr = tp(cp.x + cp.r, cp.y);
      const radiusPx = Math.abs(pr.px - p.px);
      const isHit = cpHitMax[cp.id] > 0;

      // Fill
      ctx.save();
      ctx.globalAlpha = isHit ? 0.22 : 0.10;
      ctx.fillStyle = isHit ? '#00ff88' : '#ffffff';
      ctx.beginPath(); ctx.arc(p.px, p.py, radiusPx, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // Border
      ctx.save();
      if (!isHit) ctx.setLineDash([4,3]);
      ctx.strokeStyle = isHit ? 'rgba(0,255,136,0.7)' : 'rgba(255,255,255,0.28)';
      ctx.lineWidth = isHit ? 2 : 1.5;
      if (isHit) { ctx.shadowColor='#00ff88'; ctx.shadowBlur=8; }
      ctx.beginPath(); ctx.arc(p.px, p.py, radiusPx, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur=0;
      ctx.restore();

      // Label
      ctx.fillStyle = isHit ? 'rgba(0,255,136,0.9)' : 'rgba(255,255,255,0.45)';
      ctx.font = 'bold 9px JetBrains Mono,monospace';
      ctx.textAlign = 'center';
      ctx.fillText('CP' + cp.id, p.px, p.py + 3);
    });
  }

  // ── Anchors ──
  ANC.forEach((a,i) => {
    const p=tp(a.x,a.y);
    ctx.shadowColor='rgba(0,212,255,0.7)'; ctx.shadowBlur=12;
    ctx.fillStyle='#00d4ff';
    ctx.beginPath(); ctx.arc(p.px,p.py,8,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(p.px,p.py,8,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(0,212,255,0.9)';
    ctx.font='bold 12px Rajdhani,sans-serif'; ctx.textAlign='left';
    ctx.fillText('A'+i, p.px+10, p.py-6);
  });

  // ── Cars ──
  const now=Date.now();
  Object.entries(tagData).forEach(([tidStr,d]) => {
    if (now-d.lastTime>6000) return;
    const tid=parseInt(tidStr);
    const playerIdx=players.findIndex(p=>parseInt(p.tag_id,10)===tid);
    const player=players[playerIdx];
    const color=playerIdx>=0?COLORS[playerIdx%COLORS.length]:'#ffffff';
    const label=player?player.player_name:`Tag${tid}`;
    const posNum=playerIdx>=0?playerIdx+1:'?';
    const p=tp(d.x,d.y);

    const xs=ANC.map(a=>a.x), ys=ANC.map(a=>a.y);
    const oob=d.x<Math.min(...xs)-80||d.x>Math.max(...xs)+80||d.y<Math.min(...ys)-80||d.y>Math.max(...ys)+80;

    // Trail
    if (d.trail.length>1) {
      ctx.lineJoin='round';
      for (let i=1; i<d.trail.length; i++) {
        const t0=tp(d.trail[i-1].x,d.trail[i-1].y);
        const t1=tp(d.trail[i].x,d.trail[i].y);
        ctx.globalAlpha=(i/d.trail.length)*0.45;
        ctx.strokeStyle=color; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(t0.px,t0.py); ctx.lineTo(t1.px,t1.py); ctx.stroke();
      }
      ctx.globalAlpha=1;
    }

    // Pulse ring
    ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.globalAlpha=0.22;
    ctx.beginPath(); ctx.arc(p.px,p.py,15+4*Math.sin(now/120+tid),0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;

    // Car dot
    const dotColor=oob?'#ff8800':color;
    ctx.shadowColor=dotColor; ctx.shadowBlur=oob?24:18;
    ctx.fillStyle=dotColor;
    ctx.beginPath(); ctx.arc(p.px,p.py,12,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#fff'; ctx.lineWidth=oob?2.5:2;
    if (oob) ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.arc(p.px,p.py,12,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle='#000'; ctx.font='bold 11px Rajdhani,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(posNum,p.px,p.py); ctx.textBaseline='alphabetic';

    ctx.font='bold 13px Rajdhani,sans-serif'; ctx.textAlign='center';
    const lw=ctx.measureText(label).width+12;
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(p.px-lw/2,p.py-32,lw,16);
    ctx.fillStyle=color; ctx.fillText(label,p.px,p.py-20);

    const lapInfo=d.lapInfo;
    if (lapInfo&&lapInfo.is_racing) {
      const elapsed=d.lapStartTime?(now-d.lapStartTime)/1000:(lapInfo.current_lap_elapsed||0);
      const mins=Math.floor(elapsed/60);
      const secs=(elapsed%60).toFixed(2).padStart(5,'0');
      const timerStr=mins>0?`${mins}:${secs}`:secs;
      const lapStr=`L${lapInfo.current_lap}/${lapInfo.total_laps}`;
      const tw2=86, th2=30, tx=p.px-tw2/2, ty=p.py-70;
      ctx.fillStyle='rgba(0,0,0,0.75)';
      ctx.beginPath(); ctx.roundRect(tx,ty,tw2,th2,5); ctx.fill();
      ctx.strokeStyle=color; ctx.lineWidth=1;
      ctx.beginPath(); ctx.roundRect(tx,ty,tw2,th2,5); ctx.stroke();
      ctx.font='bold 9px Rajdhani,sans-serif'; ctx.fillStyle=color;
      ctx.textAlign='center'; ctx.fillText(lapStr,p.px,ty+10);
      ctx.font='bold 12px JetBrains Mono,monospace'; ctx.fillStyle='#fff';
      ctx.fillText(timerStr,p.px,ty+24);
    }

    ctx.font='9px JetBrains Mono,monospace';
    ctx.fillStyle=oob?'#ff8800':'rgba(255,255,255,0.55)';
    ctx.textAlign='center';
    ctx.fillText(`${d.x.toFixed(0)},${d.y.toFixed(0)}cm`,p.px,p.py+28);
    if (d.speed!=null) {
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText(d.speed.toFixed(1)+' km/h',p.px,p.py+39);
    }
    if (oob) {
      ctx.fillStyle='#ff8800'; ctx.font='bold 9px JetBrains Mono,monospace';
      ctx.fillText('⚠ OOB',p.px,p.py+50);
    }
    ctx.textAlign='left';
  });

  // ── Leaderboard overlay ──
  {
    const MEDAL=['🥇','🥈','🥉'];
    function fmtTime(s) {
      if (s==null||s===Infinity) return '—';
      const m=Math.floor(s/60);
      return m>0?`${m}:${(s%60).toFixed(2).padStart(5,'0')}`:(s%60).toFixed(2).padStart(5,'0');
    }
    const ranked=[];
    liveLeaderboard.forEach(lb => {
      const player=players.find(p=>p.tag_id!==null&&parseInt(p.tag_id,10)===lb.car_id);
      if (!player) return;
      const d=tagData[lb.car_id]; const li=d?.lapInfo;
      ranked.push({lb,player,d,li});
    });
    players.forEach(p => {
      if (!ranked.find(r=>r.player===p)) {
        const d=p.tag_id!==null?tagData[parseInt(p.tag_id,10)]:null;
        ranked.push({lb:null,player:p,d,li:d?.lapInfo});
      }
    });
    if (!ranked.length) { requestAnimationFrame(draw); return; }

    const rowH=26, panW=248, panH=ranked.length*rowH+30;
    const px2=canvas.width-panW-8, py2=canvas.height-panH-8;
    ctx.fillStyle='rgba(8,11,16,0.88)';
    ctx.beginPath(); ctx.roundRect(px2,py2,panW,panH,7); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(px2,py2,panW,panH,7); ctx.stroke();
    ctx.font='bold 10px Rajdhani,sans-serif';
    ctx.fillStyle='rgba(0,212,255,0.7)'; ctx.textAlign='left';
    ctx.fillText('STANDINGS',px2+10,py2+16);
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.textAlign='right';
    ctx.font='9px JetBrains Mono,monospace';
    ctx.fillText('BEST LAP',px2+panW-8,py2+16);

    ranked.forEach(({lb,player,d,li},ri) => {
      const idx=players.indexOf(player);
      const color2=COLORS[idx%COLORS.length];
      const ry=py2+26+ri*rowH;
      if (ri%2===0) { ctx.fillStyle='rgba(255,255,255,0.03)'; ctx.fillRect(px2,ry,panW,rowH); }
      ctx.fillStyle=color2; ctx.fillRect(px2,ry,3,rowH);
      ctx.textAlign='left';
      if (lb) {
        const medal=ri<3?MEDAL[ri]:null;
        if (medal) { ctx.font='13px serif'; ctx.fillText(medal,px2+6,ry+rowH-7); }
        else { ctx.font='bold 12px Rajdhani,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.fillText(`P${ri+1}`,px2+6,ry+rowH-7); }
      } else { ctx.font='10px JetBrains Mono,monospace'; ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillText('—',px2+8,ry+rowH-7); }
      ctx.font='bold 12px Rajdhani,sans-serif'; ctx.fillStyle=color2; ctx.textAlign='left';
      ctx.fillText(player.player_name.substring(0,11),px2+28,ry+rowH-7);
      const lapsTotal=li?li.total_laps:currentTotalLaps;
      const finished=li?.race_finished||(lb&&lb.laps_done>=lapsTotal);
      const racing=li?.is_racing;
      if (finished) {
        ctx.fillStyle='rgba(0,255,136,0.15)';
        ctx.beginPath(); ctx.roundRect(px2+panW-60,ry+4,50,rowH-8,3); ctx.fill();
        ctx.fillStyle='#00ff88'; ctx.font='bold 9px Rajdhani,sans-serif';
        ctx.textAlign='center'; ctx.fillText('DONE',px2+panW-35,ry+rowH-9);
        ctx.font='9px JetBrains Mono,monospace'; ctx.fillStyle='#ffd700';
        ctx.fillText(fmtTime(lb?.best_elp),px2+panW-35,ry+rowH-1);
      } else if (racing) {
        ctx.textAlign='right'; ctx.font='9px JetBrains Mono,monospace';
        ctx.fillStyle='rgba(255,255,255,0.45)';
        ctx.fillText(`L${li.current_lap}/${lapsTotal}`,px2+panW-72,ry+rowH-7);
        const elapsed2=d?.lapStartTime?(now-d.lapStartTime)/1000:(li.current_lap_elapsed||0);
        ctx.font='bold 11px JetBrains Mono,monospace'; ctx.fillStyle='#fff';
        ctx.fillText(fmtTime(elapsed2),px2+panW-8,ry+rowH-7);
        if (lb?.best_elp<Infinity) {
          ctx.font='8px JetBrains Mono,monospace'; ctx.fillStyle='#ffd700';
          ctx.fillText(`best:${fmtTime(lb.best_elp)}`,px2+panW-8,ry+rowH);
        }
      } else if (lb) {
        ctx.textAlign='right'; ctx.font='bold 11px JetBrains Mono,monospace';
        ctx.fillStyle='#ffd700'; ctx.fillText(fmtTime(lb.best_elp),px2+panW-8,ry+rowH-7);
      } else {
        ctx.textAlign='right'; ctx.font='9px Rajdhani,sans-serif';
        ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillText('waiting…',px2+panW-8,ry+rowH-7);
      }
    });
    ctx.textAlign='left';
  }

  requestAnimationFrame(draw);
}
draw();

// WEBSOCKET
// ═══════════════════════════════════════════════════════════
let ws, reconnTimer;

function connectWS() {
  if (ws) { try { ws.close(); } catch(e){} }
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{ setPill(true); dbg('d_ws','connected','ok'); clearTimeout(reconnTimer); reconnTimer=null; };
  ws.onclose=()=>{ setPill(false); dbg('d_ws','disconnected','err'); if (!reconnTimer) reconnTimer=setTimeout(connectWS,2500); };
  ws.onerror=()=>{ setPill(false); dbg('d_ws','error','err'); };

  ws.onmessage=(e)=>{
    try {
      const msg=JSON.parse(e.data);
      dbg('d_last',msg.type,'hi');
      let needPlayerRerender = false;

      if (msg.type==='connection') return;

      if (msg.type==='state_update') {
        document.getElementById('sLaps').textContent=msg.total_laps??'—';
        document.getElementById('sGroup').textContent=msg.group_id??'—';
        if (msg.feed?.length) appendFeed(msg.feed);
        if (msg.leaderboard) { liveLeaderboard=msg.leaderboard; renderLeaderboard(); }
        if (msg.cars) {
          msg.cars.forEach(car=>{
            const tid=parseInt(car.tag_id,10);
            if (isNaN(tid)) return;
            if (!tagData[tid]) tagData[tid]={x:0,y:0,trail:[],lastTime:0,speed:0,lapInfo:null,lapStartTime:null};
            if (car.x!=null) tagData[tid].x=car.x;
            if (car.y!=null) tagData[tid].y=car.y;
            tagData[tid].lastTime=Date.now();
            const prevRacing = tagData[tid].lapInfo?.is_racing;
            tagData[tid].lapInfo=car.lap_info;
            if (car.speed!=null) tagData[tid].speed=car.speed;
            // If racing status just changed, re-render player cards
            if (prevRacing !== car.lap_info?.is_racing) needPlayerRerender = true;
          });
          refreshDebugBar();
          if (needPlayerRerender) { renderPlayers(); needPlayerRerender=false; }
        }
        return;
      }

      // ★★★ TAG_POSITION — outlier rejection + EMA smoothing ★★★
      if (msg.type==='tag_position') {
        const tid=parseInt(msg.tag_id,10);
        if (isNaN(tid)) return;

        // ── RAW MONITOR: log every incoming packet before any filtering ──
        rawMonitorIngest(tid, msg);

        if (!tagData[tid]) tagData[tid]={x:0,y:0,trail:[],lastTime:0,speed:0,lapInfo:null,lapStartTime:null};

        let rx=msg.x, ry=msg.y;
        const prev=tagData[tid];

        // ── ADAPTIVE FILTER for WiFi UWB noise ──────────────────────────
        // WiFi UWB has ~20-40cm noise floor. Strategy:
        //   • Hard-reject outlier jumps (>MAX_JUMP_CM)
        //   • Track a rolling speed estimate from last N raw samples
        //   • If car appears stationary (raw speed < STILL_THRESHOLD):
        //       apply VERY strong smoothing (alpha=0.06) — nearly frozen
        //   • If car is moving:
        //       apply medium smoothing (alpha=0.20) — responsive but stable
        //   • Additionally: only move the display point if the EMA-filtered
        //     change exceeds DEAD_ZONE_CM — stops sub-noise pixel jitter

        const STILL_THRESHOLD = 8;   // cm/s — below this = treat as stationary
        const DEAD_ZONE_CM    = 3;   // cm — ignore movements smaller than this
        const ALPHA_STILL     = 0.06; // very heavy smoothing when still
        const ALPHA_MOVING    = 0.20; // medium smoothing when moving

        if (prev.lastTime > 0) {
          const dx = rx - prev.x, dy = ry - prev.y;
          const dist = Math.sqrt(dx*dx + dy*dy);

          // Hard outlier reject
          if (dist > MAX_JUMP_CM) {
            rawMonitorMarkDropped();
            return;
          }

          // Estimate instantaneous speed from raw positions
          const dtSec = (Date.now() - prev.lastTime) / 1000 || 0.033;
          const rawSpeedCms = dist / dtSec;

          // Choose alpha based on stillness
          const alpha = rawSpeedCms < STILL_THRESHOLD ? ALPHA_STILL : ALPHA_MOVING;

          const smoothX = prev.x + alpha * (rx - prev.x);
          const smoothY = prev.y + alpha * (ry - prev.y);

          // Dead-zone: only update display if smoothed change > threshold
          const smoothDist = Math.sqrt((smoothX-prev.x)**2 + (smoothY-prev.y)**2);
          if (smoothDist < DEAD_ZONE_CM) {
            // Position didn't change enough — still update lastTime but keep coords
            tagData[tid].lastTime = Date.now();
            tagData[tid].speed    = msg.speed ?? tagData[tid].speed;
            packetsThisSec++; totalPackets++;
            updatePositionLabels();
            return;
          }
          rx = smoothX;
          ry = smoothY;
        }

        tagData[tid].x = rx;
        tagData[tid].y = ry;
        tagData[tid].speed = msg.speed ?? tagData[tid].speed;
        tagData[tid].lastTime = Date.now();

        tagData[tid].trail.push({x:rx, y:ry});
        if (tagData[tid].trail.length > 40) tagData[tid].trail.shift();

        packetsThisSec++;
        totalPackets++;
        if (totalPackets%20===0) {
          dbg('d_pos',`Tag${tid} (${rx.toFixed(0)},${ry.toFixed(0)})cm`,'ok');
          refreshDebugBar();
        }

        if (msg.game_events?.length) {
          appendFeed(msg.game_events.map(ev=>{
            if (ev.type==='lap_done') {
              setTimeout(renderLeaderboard,200);
              const _p=players.find(p=>p.player_name===ev.car_name);
              if (_p&&_p.tag_id!==null) {
                const _tid=parseInt(_p.tag_id,10);
                if (!isNaN(_tid)&&tagData[_tid]) {
                  tagData[_tid].lapStartTime=Date.now();
                  // Reset checkpoint pips for next lap
                  if (tagData[_tid].lapInfo) {
                    tagData[_tid].lapInfo.checkpoints_hit=0;
                    // Bump lap counter immediately for responsive display
                    if (tagData[_tid].lapInfo.current_lap)
                      tagData[_tid].lapInfo.current_lap = ev.lap + 1;
                  }
                  setTimeout(renderPlayers, 10);
                }
              }
              // ★ Immediately update leaderboard entry with new best lap
              if (ev.elp != null) {
                let lb = liveLeaderboard.find(r=>r.car_id===_tid);
                if (!lb) { lb={car_id:_tid,best_elp:Infinity,best_raw:Infinity,laps_done:0}; liveLeaderboard.push(lb); }
                if (ev.elp < lb.best_elp) lb.best_elp = ev.elp;
                if (ev.raw_time < lb.best_raw) lb.best_raw = ev.raw_time;
                lb.laps_done = (lb.laps_done||0) + 1;
              }
              setTimeout(renderLeaderboard, 50);
              return `LAP  ${ev.car_name} #${ev.lap}  ${ev.raw_time?.toFixed(2)}s  ELP:${ev.elp?.toFixed(2)}s`;
            }
            if (ev.type==='race_start') {
              const _p=players.find(p=>p.player_name===ev.car_name);
              if (_p&&_p.tag_id!==null) {
                const _tid=parseInt(_p.tag_id,10);
                if (!isNaN(_tid)) {
                  if (!tagData[_tid]) tagData[_tid]={x:0,y:0,trail:[],lastTime:0,speed:0,lapInfo:null,lapStartTime:null};
                  tagData[_tid].lapStartTime=Date.now();
                  // ★ Immediately inject lapInfo so the timer card appears right away
                  //   (don't wait for next state_update which may be 1-2s away)
                  if (!tagData[_tid].lapInfo) tagData[_tid].lapInfo = {};
                  tagData[_tid].lapInfo.is_racing      = true;
                  tagData[_tid].lapInfo.current_lap    = ev.lap || 1;
                  tagData[_tid].lapInfo.total_laps     = currentTotalLaps;
                  tagData[_tid].lapInfo.checkpoints_hit   = 0;
                  tagData[_tid].lapInfo.checkpoints_total = CSV_TRACK.checkpoints.length;
                  // Re-render player cards immediately so the timer element exists
                  setTimeout(renderPlayers, 10);
                }
              }
              return `START  ${ev.car_name}`;
            }
            if (ev.type==='checkpoint') {
              // cp_hit event: update lapInfo checkpoint counter immediately
              const _p=players.find(p=>p.player_name===ev.car_name);
              if (_p&&_p.tag_id!==null) {
                const _tid=parseInt(_p.tag_id,10);
                if (!isNaN(_tid)&&tagData[_tid]?.lapInfo)
                  tagData[_tid].lapInfo.checkpoints_hit = ev.cp_index + 1;
              }
              return `CP${ev.cp_index}  ${ev.car_name}`;
            }
            if (ev.type==='race_finish') return `FINISH  ${ev.car_name}`;
            if (ev.type==='wall')        return `WALL  ${ev.car_name}`;
            if (ev.type==='car')         return `HIT  ${ev.attacker_name} → ${ev.victim_name}`;
            return JSON.stringify(ev);
          }));
        }

        updatePositionLabels();
        return;
      }

      if (msg.type==='admin_event') {
        appendFeed([`[${msg.event}] ${msg.message}`]);
        return;
      }

    } catch(err) { console.error('[WS] parse error:',err); }
  };
}

function setPill(ok) {
  const el=document.getElementById('wsPill');
  el.className='ws-pill '+(ok?'ws-ok':'ws-fail');
  el.textContent=ok?'● Connected':'● Disconnected';
}

connectWS();

setInterval(()=>{
  document.getElementById('sPkt').textContent=packetsThisSec;
  packetsThisSec=0;
  const now=Date.now();
  const active=players.filter(p=>{
    if (p.tag_id===null) return false;
    const d=tagData[parseInt(p.tag_id,10)];
    return d&&(now-d.lastTime)<4000;
  }).length;
  document.getElementById('sActive').textContent=active;
  refreshDebugBar();
},1000);

// ★ Live timer tick — updates current lap time + best lap every 100ms in-place
//   No DOM rebuild needed — just patch text of existing elements
setInterval(()=>{
  const now = Date.now();

  players.forEach(p => {
    const tid = parseInt(p.tag_id, 10);
    if (isNaN(tid)) return;
    const d = tagData[tid];
    if (!d) return;

    // ── Current lap timer ──
    const timerEl = document.querySelector(`.lap-timer[data-tag="${tid}"]`);
    if (timerEl && d.lapStartTime && d.lapInfo?.is_racing) {
      const elapsed = (now - d.lapStartTime) / 1000;
      const m = Math.floor(elapsed / 60);
      const s = (elapsed % 60).toFixed(2).padStart(5, '0');
      timerEl.textContent = m > 0 ? `${m}:${s}` : s;
    }

    // ── Best lap (update in-place when leaderboard has newer data) ──
    const bestEl = document.getElementById(`best-${tid}`);
    if (bestEl) {
      const lb = liveLeaderboard.find(r => r.car_id === tid);
      const bestElp = (lb && lb.best_elp < 1e9) ? lb.best_elp : null;
      if (bestElp != null) {
        bestEl.textContent = fmtLapTime(bestElp);
        bestEl.className = 'pcard-timing-value best';
      }
    }
  });
}, 100);

function appendFeed(lines) {
  const wrap=document.getElementById('feed');
  lines.forEach(l=>{
    const div=document.createElement('div');
    div.className='feed-item hi'; div.textContent=l;
    wrap.prepend(div);
    setTimeout(()=>div.classList.remove('hi'),3000);
  });
  while (wrap.children.length>40) wrap.removeChild(wrap.lastChild);
}

// ═══════════════════════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════════════════════
async function apiFetch(url) {
  try { const r=await fetch(url,{credentials:'include'}); return r.json(); }
  catch(e) { console.error(e); return {data:[]}; }
}
function getCSRF() {
  const m=document.cookie.match(/csrftoken=([^;]+)/);
  return m?m[1]:'';
}
async function apiPatch(url,body) {
  const r=await fetch(url,{
    method:'PATCH',
    headers:{'Content-Type':'application/json','X-CSRFToken':getCSRF()},
    credentials:'include',
    body:JSON.stringify(body),
  });
  return r.json();
}
function sendWS(payload) {
  if (ws&&ws.readyState===WebSocket.OPEN) {
    ws.send(JSON.stringify(payload));
    console.log('[WS→]',payload.type,payload);
  } else {
    console.warn('[WS] not connected:',payload.type);
  }
}

// TOURNAMENT / GROUP LOADING
// ═══════════════════════════════════════════════════════════
async function loadTournaments() {
  const {data}=await apiFetch(API.list);
  const sel=document.getElementById('tSel');
  (data||[]).forEach(t=>{
    const o=document.createElement('option');
    o.value=t.slug; o.textContent=t.name;
    sel.appendChild(o);
  });
}

async function loadGroups() {
  const slug=document.getElementById('tSel').value;
  const gSel=document.getElementById('gSel');
  gSel.innerHTML='<option value="">— Group —</option>';
  gSel.disabled=true;
  currentGroupId=null; currentGroupStatus='';
  players=[]; trackPoints=[]; csvInnerPoints=[]; csvOuterPoints=[];
  reassignMode=false;
  setBadge(''); updateButtons(); renderPlayers();
  if (!slug) return;

  const {data}=await apiFetch(API.struct+'?slug='+slug);
  if (!data?.rounds) return;

  currentTotalLaps=data.total_laps||10;
  raceConfig={
    total_laps:               data.total_laps               ||null,
    collision_absorbing_time: data.collision_absorbing_time??null,
    collision_creating_time:  data.collision_creating_time ??null,
    object_collision_time:    data.object_collision_time   ??null,
  };

  // ★ Always use embedded CSV track data
  trackPoints    = CSV_TRACK.center;
  csvInnerPoints = CSV_TRACK.inner;
  csvOuterPoints = CSV_TRACK.outer;
  console.log(`[TRACK] Loaded CSV: ${trackPoints.length} center, ${csvInnerPoints.length} inner, ${csvOuterPoints.length} outer pts`);

  gSel.disabled=false;
  data.rounds.forEach(r=>{
    const og=document.createElement('optgroup');
    og.label=`Round ${r.round_no} — ${r.round_name}${r.is_final?' 🏆':''}`;
    r.groups.forEach(g=>{
      const o=document.createElement('option');
      o.value=g.group_id;
      o.dataset.status=g.group_status||'';
      o.textContent=g.group_name+(g.group_status?` [${g.group_status}]`:'');
      og.appendChild(o);
    });
    gSel.appendChild(og);
  });
}

async function selectGroup() {
  const gSel=document.getElementById('gSel');
  currentGroupId=gSel.value||null;
  reassignMode=false;
  if (!currentGroupId) {
    players=[]; currentGroupStatus='';
    setBadge(''); updateButtons(); renderPlayers(); return;
  }
  const opt=gSel.options[gSel.selectedIndex];
  currentGroupStatus=opt.dataset.status||'';
  setBadge(currentGroupStatus);
  updateButtons();

  const {data}=await apiFetch(API.players+'?group_id='+currentGroupId);
  players=(data||[]).map(p=>({
    ...p,
    tag_id:(p.tag_id!==null&&p.tag_id!==undefined&&p.tag_id!=='')
           ?parseInt(p.tag_id,10):null,
  }));
  console.log('[GROUP] players:',players.map(p=>`${p.player_name}→tag${p.tag_id}`));
  refreshDebugBar();
  renderPlayers();
}

// ═══════════════════════════════════════════════════════════
// RACE ACTIONS
// ═══════════════════════════════════════════════════════════
function buildTagMap() {
  const map={};
  players.forEach(p=>{
    if (p.tag_id!==null&&p.tag_id!==undefined)
      map[String(p.tag_id)]=p.gp_id;
  });
  return map;
}

async function doLive() {
  if (!currentGroupId) return;
  const res=await apiPatch(API.markLive,{group_id:currentGroupId});
  if (!res.success) { alert('Failed to mark group live'); return; }
  currentGroupStatus='live'; reassignMode=false;
  setBadge('live'); updateButtons();
  const gSel=document.getElementById('gSel');
  const opt=gSel.options[gSel.selectedIndex];
  opt.dataset.status='live';
  opt.textContent=opt.textContent.replace(/\s*\[.*?\]\s*$/,'')+' [live]';
  sendWS({type:'admin_start',group_id:parseInt(currentGroupId),
          total_laps:currentTotalLaps,tag_map:buildTagMap(),race_config:raceConfig});
  appendFeed([`▶ Group ${currentGroupId} LIVE – ${currentTotalLaps} laps`]);
  renderPlayers();
}

async function doFinish() {
  if (!currentGroupId) return;
  if (!confirm('Mark race as finished?')) return;
  const res=await apiPatch(API.markFinish,{group_id:currentGroupId});
  if (!res.success) { alert('Failed to mark group finished'); return; }
  currentGroupStatus='finished'; setBadge('finished');
  const gSel=document.getElementById('gSel');
  const opt=gSel.options[gSel.selectedIndex];
  opt.dataset.status='finished';
  opt.textContent=opt.textContent.replace(/\s*\[.*?\]\s*$/,'')+' [finished]';
  sendWS({type:'reset'});
  appendFeed(['⏹ Race finished']);
  Object.keys(tagData).forEach(tid=>{
    tagData[tid].trail=[]; tagData[tid].lapInfo=null; tagData[tid].lapStartTime=null;
  });
  liveLeaderboard=[]; renderLeaderboard();
  reassignMode=true; updateButtons(); renderPlayers();
}

function doRestart() {
  if (!currentGroupId) return;
  if (!confirm('Reset race data?')) return;
  sendWS({type:'reset'});
  Object.keys(tagData).forEach(tid=>{ tagData[tid].trail=[]; tagData[tid].lapInfo=null; });
  reassignMode=true;
  appendFeed(['↺ Race reset — reassign tags then click ▶ Restart Race']);
  renderPlayers(); updateButtons();
}

// ═══════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════
function setBadge(status) {
  const el=document.getElementById('gBadge');
  const map={live:['b-live','LIVE'],finished:['b-finished','FINISHED']};
  const [cls,lbl]=map[status]||['b-default',status?status.toUpperCase():''];
  el.className='badge '+(reassignMode?'b-reassign':cls);
  el.textContent=reassignMode?'REASSIGN TAGS':lbl;
}

function updateButtons() {
  const btnLive=document.getElementById('btnLive');
  const btnFinish=document.getElementById('btnFinish');
  const btnRestart=document.getElementById('btnRestart');
  const has=!!currentGroupId, live=currentGroupStatus==='live', done=currentGroupStatus==='finished';
  if (reassignMode) {
    btnLive.textContent='▶ Restart Race'; btnLive.disabled=false;
    btnFinish.disabled=true; btnRestart.disabled=true;
  } else if (done) {
    btnLive.textContent='▶ Live'; btnLive.disabled=true;
    btnFinish.disabled=true; btnRestart.disabled=!has;
  } else {
    btnLive.textContent='▶ Live'; btnLive.disabled=!has||live;
    btnFinish.disabled=!live; btnRestart.disabled=!live;
  }
}

function canEditTags() {
  return reassignMode||(currentGroupStatus!=='live'&&currentGroupStatus!=='finished');
}

function renderPlayers() {
  const wrap=document.getElementById('players');
  if (!players.length) { wrap.innerHTML='<p class="ph">No players in this group</p>'; return; }
  const editable=canEditTags(), now=Date.now();
  const banner=reassignMode
    ?`<div style="background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:6px;padding:8px 10px;margin-bottom:10px;font-size:.78rem;color:var(--yellow);font-weight:600;">↺ Reassign tags below, then click <strong>▶ Restart Race</strong></div>`
    :'';
  wrap.innerHTML=banner+renderCards(editable,now);
}

function renderCards(editable,now) {
  return players.map((p,idx)=>{
    const color=COLORS[idx%COLORS.length];
    const tid=parseInt(p.tag_id,10);
    const d=!isNaN(tid)?tagData[tid]:null;
    const fresh=d&&(now-d.lastTime)<4000;
    const racing=currentGroupStatus==='live'&&!reassignMode&&fresh;

    let posLine='';
    if (racing&&d) {
      posLine=`<div class="pcard-pos" id="ppos-${tid}">x:${d.x.toFixed(0)} y:${d.y.toFixed(0)} · ${(d.speed||0).toFixed(1)} km/h</div>`;
    } else if (currentGroupStatus==='live'&&!reassignMode&&!isNaN(tid)) {
      posLine=`<div class="pcard-sub" style="color:#fbbf24">Waiting for signal…</div>`;
    }

    let lapLine='';
    if (d?.lapInfo?.is_racing) {
      const li     = d.lapInfo;
      const cpHit  = li.checkpoints_hit  || 0;
      const cpTotal= li.checkpoints_total || CSV_TRACK.checkpoints.length;
      // Best lap from leaderboard
      const lb     = liveLeaderboard.find(r=>r.car_id===tid);
      const bestElp= (lb && lb.best_elp < 1e9) ? lb.best_elp : null;

      // Checkpoint pips
      const cpPips = CSV_TRACK.checkpoints.map(cp => {
        const done = cp.id < cpHit;
        const next = cp.id === cpHit;
        const col  = done ? '#00ff88' : (next ? '#ffd700' : 'rgba(255,255,255,0.12)');
        const brd  = done ? '#00ff88' : (next ? '#ffd700' : 'rgba(255,255,255,0.2)');
        return `<span title="CP${cp.id} ${cp.label}" style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${col};border:1.5px solid ${brd};"></span>`;
      }).join('');

      lapLine=`<div class="pcard-timing">
        <div class="pcard-timing-row">
          <span class="pcard-timing-label">LAP ${li.current_lap} / ${li.total_laps}</span>
          <span class="pcard-timing-label" style="color:rgba(255,255,255,0.2);">CURRENT</span>
        </div>
        <div class="pcard-timing-row">
          <span class="pcard-timing-value running lap-timer" data-tag="${tid}">0.00</span>
        </div>
        <div class="pcard-timing-row" style="margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,255,255,0.06);">
          <span class="pcard-timing-label">BEST LAP</span>
          ${bestElp!=null
            ? `<span class="pcard-timing-value best" id="best-${tid}">${fmtLapTime(bestElp)}</span>`
            : `<span class="pcard-timing-value no-data" id="best-${tid}">—</span>`}
        </div>
        <div class="pcard-cp-row">
          <span style="font-size:.55rem;letter-spacing:1px;color:rgba(255,255,255,0.3);margin-right:4px;">CP</span>
          ${cpPips}
          <span style="font-size:.58rem;color:rgba(255,255,255,0.3);margin-left:4px;">${cpHit}/${cpTotal}</span>
        </div>
      </div>`;
    } else if (d?.lapInfo?.race_finished) {
      const lb     = liveLeaderboard.find(r=>r.car_id===tid);
      const bestElp= (lb && lb.best_elp < 1e9) ? lb.best_elp : null;
      lapLine=`<div class="pcard-timing">
        <div class="pcard-timing-row">
          <span class="pcard-timing-label">FINISHED</span>
          <span style="font-size:.8rem;">🏆</span>
        </div>
        ${bestElp!=null?`<div class="pcard-timing-row">
          <span class="pcard-timing-label">BEST LAP</span>
          <span class="pcard-timing-value best">${fmtLapTime(bestElp)}</span>
        </div>`:''}
      </div>`;
    } else if (d?.lapInfo && !d.lapInfo.is_racing && d.lapStartTime) {
      // Has raced but lap_done came through — show best lap while waiting
      const lb     = liveLeaderboard.find(r=>r.car_id===tid);
      const bestElp= (lb && lb.best_elp < 1e9) ? lb.best_elp : null;
      if (bestElp!=null) lapLine=`<div class="pcard-timing">
        <div class="pcard-timing-row">
          <span class="pcard-timing-label">BEST LAP</span>
          <span class="pcard-timing-value best">${fmtLapTime(bestElp)}</span>
        </div>
      </div>`;
    }

    const tagInput=editable?`<div class="tag-row">
      <input class="tag-inp" type="text" value="${!isNaN(tid)?tid:''}"
             placeholder="Tag ID (number)" data-gp="${p.gp_id}"
             onblur="saveTag(this)"
             onkeydown="if(event.key==='Enter'){event.preventDefault();saveTag(this)}"/>
      <div class="tag-hint" id="hint-${p.gp_id}"></div>
    </div>`:'';

    return `<div class="pcard ${racing?'active pulse':''}" style="--cc:${color}">
      <div class="pcard-hdr">
        <div class="pcard-dot"></div>
        <div class="pcard-name">${p.player_name}</div>
        ${!isNaN(tid)?`<span class="pcard-tag">#${tid}</span>`:''}
      </div>
      <div class="pcard-sub">${p.player_status||''}</div>
      ${posLine}${lapLine}${tagInput}
    </div>`;
  }).join('');
}

function updatePositionLabels() {
  if (currentGroupStatus!=='live'||reassignMode) return;
  const now=Date.now();
  players.forEach(p=>{
    const tid=parseInt(p.tag_id,10); if (isNaN(tid)) return;
    const d=tagData[tid]; if (!d) return;
    const el=document.getElementById('ppos-'+tid);
    if (el&&(now-d.lastTime)<4000) {
      el.textContent=`x:${d.x.toFixed(0)} y:${d.y.toFixed(0)} · ${(d.speed||0).toFixed(1)} km/h`;
    } else if (!el&&(now-d.lastTime)<4000) {
      renderPlayers();
    }
  });
}

// ═══════════════════════════════════════════════════════════
// SAVE TAG
// ═══════════════════════════════════════════════════════════
async function saveTag(input) {
  if (!canEditTags()) return;
  const gpId=input.dataset.gp, rawId=input.value.trim();
  const hint=document.getElementById('hint-'+gpId); if (!hint) return;
  hint.textContent='…'; hint.className='tag-hint saving';
  const res=await apiPatch(API.updateTag,{gp_id:gpId,tag_id:rawId||null});
  if (res.success) {
    hint.textContent='✓ Saved'; hint.className='tag-hint ok';
    setTimeout(()=>{ hint.textContent=''; hint.className='tag-hint'; },2000);
    const player=players.find(p=>p.gp_id==gpId);
    if (player) { player.tag_id=rawId?parseInt(rawId,10):null; refreshDebugBar(); }
  } else {
    hint.textContent='✗ Error'; hint.className='tag-hint err';
    setTimeout(()=>{ hint.textContent=''; hint.className='tag-hint'; },2500);
  }
}

// ═══════════════════════════════════════════════════════════
// SIDEBAR LEADERBOARD
// ═══════════════════════════════════════════════════════════
function fmtLapTime(secs) {
  if (secs==null||secs===Infinity||secs>9000) return '—';
  const m=Math.floor(secs/60);
  return m>0?`${m}:${(secs%60).toFixed(3).padStart(6,'0')}`:(secs%60).toFixed(3).padStart(6,'0');
}

function renderLeaderboard() {
  const wrap=document.getElementById('lbRows'); if (!wrap) return;
  if (!liveLeaderboard.length&&!players.length) {
    wrap.innerHTML='<div style="color:var(--muted);font-size:.75rem;text-align:center;padding:8px 0;">No lap data yet</div>';
    return;
  }
  const MEDAL_COLORS=['#ffd700','#c0c0c0','#cd7f32'];
  const MEDAL_LABELS=['P1','P2','P3'];
  const ranked=[];
  liveLeaderboard.forEach(lb=>{
    const player=players.find(p=>p.tag_id!==null&&parseInt(p.tag_id,10)===lb.car_id);
    ranked.push({lb,player});
  });
  players.forEach(p=>{ if (!ranked.find(r=>r.player===p)) ranked.push({lb:null,player:p}); });

  wrap.innerHTML=ranked.map(({lb,player},ri)=>{
    if (!player) return '';
    const idx=players.indexOf(player);
    const color=COLORS[idx%COLORS.length];
    const isTop3=ri<3&&lb;
    const mColor=isTop3?MEDAL_COLORS[ri]:'rgba(255,255,255,0.3)';
    const mLabel=lb?(ri<3?MEDAL_LABELS[ri]:`P${ri+1}`):'—';
    const done=lb&&lb.laps_done>=currentTotalLaps;
    return `<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
      <div style="width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.4);border:2px solid ${mColor};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="font-size:.65rem;font-weight:700;color:${mColor};font-family:'JetBrains Mono',monospace;">${mLabel}</span>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:.85rem;color:${color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
          ${player.player_name}
          ${done?'<span style="font-size:.6rem;background:rgba(0,255,136,.15);color:#00ff88;border:1px solid rgba(0,255,136,.3);border-radius:3px;padding:1px 5px;margin-left:4px;">DONE</span>':''}
        </div>
        <div style="font-size:.65rem;color:var(--muted);margin-top:1px;">
          ${lb?`${lb.laps_done}/${currentTotalLaps} laps`:'not started'}
          ${lb?.penalty_total>0?` · +${lb.penalty_total.toFixed(1)}s pen`:''}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;color:${isTop3?mColor:'#fff'};">${fmtLapTime(lb?.best_elp)}</div>
        ${lb?.best_raw&&lb.best_elp!==lb.best_raw?`<div style="font-size:.6rem;color:var(--muted);">raw ${fmtLapTime(lb.best_raw)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// RAW MONITOR — live UDP stream display
// ═══════════════════════════════════════════════════════════
const RAW_MAX_ROWS  = 80;   // keep this many rows in the log
const RAW_RATE_WIN  = 1000; // ms window for per-tag rate calc

let rawPaused      = false;
let rawTagCounters = {};    // tid → { count, lastSec, rate, lastTs }

function rawMonitorIngest(tid, msg) {
  // ── per-tag rate tracking ──
  const now = Date.now();
  if (!rawTagCounters[tid]) rawTagCounters[tid] = { count:0, windowStart:now, rate:0, lastTs:now };
  const tc = rawTagCounters[tid];
  tc.count++;
  tc.lastTs = now;
  const elapsed = (now - tc.windowStart) / 1000;
  if (elapsed >= 1.0) {
    tc.rate = Math.round(tc.count / elapsed);
    tc.count = 0;
    tc.windowStart = now;
  }

  // ── update total rate display ──
  const allRates = Object.values(rawTagCounters).reduce((s,t)=>s+t.rate,0);
  document.getElementById('rawTotalRate').textContent = allRates + ' pkt/s';

  // ── update per-tag pills ──
  renderTagRatePills();

  // ── append log row ──
  if (rawPaused) return;
  const log = document.getElementById('rawLog');

  const timeStr = new Date().toLocaleTimeString('en-GB',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}) +
                  '.' + String(now % 1000).padStart(3,'0');

  const ranges  = Array.isArray(msg.range) ? msg.range.map(r=>String(Math.round(r)).padStart(4,' ')).join(' ') : '—';
  const qual    = msg.quality || '?';
  const qualCls = qual==='excellent'?'excellent':qual==='good'?'good':qual==='fair'?'fair':'oob';
  const color   = COLORS[tid % COLORS.length];
  const xStr    = msg.x!=null ? msg.x.toFixed(0).padStart(4,' ') : '  —';
  const yStr    = msg.y!=null ? msg.y.toFixed(0).padStart(4,' ') : '  —';
  const spd     = msg.speed!=null ? msg.speed.toFixed(1) : '—';

  const row = document.createElement('div');
  row.className = 'rlog-row';
  row.innerHTML =
    `<span class="rlog-time">${timeStr.slice(0,12)}</span>` +
    `<span class="rlog-tag" style="color:${color}">T${tid}</span>` +
    `<span class="rlog-xy">${xStr},${yStr}cm</span>` +
    `<span class="rlog-ranges">[ ${ranges} ]  ${spd}km/h</span>` +
    `<span class="rlog-qual ${qualCls}">${qual}</span>`;

  // insert after header row (first child)
  const header = log.firstChild;
  log.insertBefore(row, header ? header.nextSibling : null);

  // prune old rows
  while (log.children.length > RAW_MAX_ROWS + 1) log.removeChild(log.lastChild);
}

function renderTagRatePills() {
  const wrap = document.getElementById('rawTagRates');
  const now  = Date.now();
  const tids = Object.keys(rawTagCounters).map(Number).sort();
  if (!tids.length) return;

  // max rate for bar scaling
  const maxRate = Math.max(1, ...tids.map(t => rawTagCounters[t].rate));

  wrap.innerHTML = tids.map(tid => {
    const tc    = rawTagCounters[tid];
    const color = COLORS[tid % COLORS.length];
    const stale = (now - tc.lastTs) > 3000;
    const pct   = stale ? 0 : Math.min(100, Math.round(tc.rate / maxRate * 100));
    const rate  = stale ? 'silent' : tc.rate + '/s';
    return `<div class="rtag-pill">
      <span class="rtag-id" style="color:${color}">T${tid}</span>
      <span class="rtag-rate">${rate}</span>
      <div class="rtag-bar"><div class="rtag-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');
}

function toggleRawMonitor() {
  rawPaused = !rawPaused;
  document.getElementById('rawToggleBtn').textContent = rawPaused ? 'RESUME' : 'PAUSE';
  document.getElementById('rawToggleBtn').style.color = rawPaused ? '#ff3b5c' : '#e2eaf4';
}

function clearRawLog() {
  const log = document.getElementById('rawLog');
  // keep only the header row
  while (log.children.length > 1) log.removeChild(log.lastChild);
  rawTagCounters = {};
  document.getElementById('rawTotalRate').textContent = '0 pkt/s';
  document.getElementById('rawTagRates').innerHTML =
    '<span style="color:#4a5568;font-family:\'JetBrains Mono\',monospace;font-size:.6rem;align-self:center;">waiting for data…</span>';
}

// Refresh stale pill states every second even when no packets arrive
setInterval(renderTagRatePills, 1000);

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
loadTournaments();
console.log('[XRace] ready | CSV track pts:', CSV_TRACK.center.length, '| MAX_JUMP:', MAX_JUMP_CM, 'cm | EMA_ALPHA:', EMA_ALPHA);
